<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>昆仑谣 · 青鸟引 — 全场景交互</title>
<style>
:root{--void:#06050F;--gold:#D4A853;--pale:#F0E6C8}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--void);font-family:'Noto Serif SC','PingFang SC',serif}

/* ===== 场景图层 ===== */
#stage{position:fixed;inset:0;z-index:0;display:flex;align-items:center;justify-content:center;background:var(--void)}
.shot{position:relative;width:100vmin;height:100vmin;flex-shrink:0;background-size:cover;background-position:center;opacity:0;transition:opacity .8s cubic-bezier(.4,0,.2,1)}
.shot.on{opacity:1}
.shot.zoom-in{animation:zi 12s ease-out both}
.shot.zoom-out{animation:zo 8s ease-in-out both}
.shot.pan-r{animation:pr 10s ease-out both}
.shot.pan-l{animation:pl 10s ease-out both}
.shot.zoom-slow{animation:zs 15s ease-out both}
@keyframes zi{from{transform:scale(1)}to{transform:scale(1.15)}}
@keyframes zo{from{transform:scale(1.15)}to{transform:scale(1)}}
@keyframes pr{from{transform:scale(1.05);transform-origin:left center}to{transform:scale(1.05);transform-origin:right center}}
@keyframes pl{from{transform:scale(1.05);transform-origin:right center}to{transform:scale(1.05);transform-origin:left center}}
@keyframes zs{from{transform:scale(1)}to{transform:scale(1.08)}}

/* ===== 全局色调统一叠层 ===== */
#tone-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(135deg, rgba(180,120,40,0.10) 0%, rgba(140,90,30,0.05) 50%, rgba(15,8,25,0.22) 100%);
  mix-blend-mode:overlay}
/* 胶片颗粒 */
#grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.06;
  background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)"/></svg>');
  background-size:180px 180px}

/* ===== 场景氛围叠层（每场景独立色温） ===== */
.shot.atm-void{box-shadow:inset 0 0 200px 80px rgba(6,8,20,0.5)}
.shot.atm-chaos{box-shadow:inset 0 0 160px 60px rgba(40,20,60,0.35)}
.shot.atm-city{box-shadow:inset 0 0 160px 60px rgba(60,35,20,0.32)}
.shot.atm-queen{box-shadow:inset 0 0 180px 70px rgba(80,50,20,0.28)}
.shot.atm-tree{box-shadow:inset 0 0 160px 60px rgba(30,55,35,0.30)}
.shot.atm-pool{box-shadow:inset 0 0 180px 70px rgba(20,25,35,0.50)}
.shot.atm-end{box-shadow:inset 0 0 180px 70px rgba(25,20,15,0.48)}

/* ===== Canvas叠层 ===== */
#rain-canvas{position:fixed;inset:0;z-index:2;pointer-events:none}
#fog-canvas{position:fixed;inset:0;z-index:2;pointer-events:auto;opacity:0;transition:opacity .6s}
#fog-canvas.on{opacity:1}
#ink-canvas{position:fixed;inset:0;z-index:3;pointer-events:auto;
  cursor:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><ellipse cx="12" cy="20" rx="3" ry="4" fill="%23111"/><rect x="11" y="2" width="2" height="14" rx="1" fill="%23333"/><circle cx="12" cy="18" r="2" fill="%23000"/></svg>') 12 22, crosshair}

/* ===== s11 手电筒光斑叠层 ===== */
#spotlight-canvas{position:fixed;inset:0;z-index:5;pointer-events:none;opacity:0;transition:opacity 1s cubic-bezier(.4,0,.2,1)}
#spotlight-canvas.on{opacity:1}
/* 光斑内的浮动文字 */
.spotlight-char{position:fixed;z-index:6;pointer-events:none;font-family:'Noto Serif SC',serif;font-weight:700;
  color:rgba(255,240,200,0.85);text-shadow:0 0 12px rgba(212,168,83,0.6),0 0 30px rgba(255,200,80,0.3);
  opacity:0;transition:opacity 1.2s,transform 2.5s cubic-bezier(.2,.6,.3,1);transform:translateY(8px) scale(0.8)}
.spotlight-char.visible{opacity:1;transform:translateY(-10px) scale(1)}
.spotlight-char.fade{opacity:0;transform:translateY(-30px) scale(0.9)}

/* ===== 暗角 ===== */
#vignette{position:fixed;inset:0;z-index:4;pointer-events:none;
  box-shadow:inset 0 0 140px 60px rgba(6,5,15,0.75);
  background:radial-gradient(ellipse at 50% 50%,transparent 40%,rgba(6,5,15,0.35) 100%)}

/* ===== 烟雾 ===== */
#mist{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:1;transition:opacity 2s;
  background:radial-gradient(ellipse 60% 30% at 20% 60%, rgba(180,200,220,0.06) 0%, transparent 70%),
             radial-gradient(ellipse 40% 20% at 70% 70%, rgba(160,180,200,0.04) 0%, transparent 60%);
  animation:mistDrift 8s ease-in-out infinite alternate}
@keyframes mistDrift{from{transform:translateX(0)}to{transform:translateX(12px)}}

/* ===== 文字穿插 ===== */
#inter{position:fixed;inset:0;z-index:15;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .4s}
#inter.on{opacity:1}
.inter-text{font-size:clamp(18px,4.5vw,34px);font-weight:700;letter-spacing:6px;color:var(--pale);text-align:center;line-height:1.6;text-shadow:0 0 30px rgba(212,168,83,.4)}
.inter-text .ch{display:inline-block;opacity:0;animation:chIn .5s cubic-bezier(.2,.8,.3,1) both}
@keyframes chIn{from{opacity:0;transform:translateY(12px) scale(.6);filter:blur(4px)}to{opacity:1;transform:none;filter:none}}
@keyframes interIn{from{opacity:0;letter-spacing:20px;transform:scale(1.05)}to{opacity:1;letter-spacing:6px;transform:none}}

/* ===== 字幕 ===== */
#sub{position:fixed;bottom:10%;left:50%;transform:translateX(-50%);z-index:12;text-align:center;pointer-events:none;opacity:0;transition:opacity .5s;max-width:80vw}
#sub.on{opacity:1}
.sub-line{display:inline-block;padding:6px 16px;border-radius:8px;background:rgba(6,5,15,0.4);backdrop-filter:blur(4px);font-size:clamp(14px,3.5vw,24px);letter-spacing:3px;color:rgba(255,255,255,.5);line-height:1.9}
/* 右侧竖排字幕（王母娘娘等特定幕）—— 相对于图片区域定位 */
#sub.sub-right{right:calc((100vw - 100vmin) / 2 + 3vmin);left:auto;bottom:12%;transform:none;text-align:left;max-width:18vmin}
#sub.sub-right .sub-line{writing-mode:vertical-rl;letter-spacing:4px;padding:10px 14px;font-size:clamp(11px,1.6vw,18px)}
.sub-line .ch{display:inline-block;opacity:0;animation:chSubIn .4s cubic-bezier(.2,.8,.3,1) both}
@keyframes chSubIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes subRise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ===== 章节 ===== */
#chap{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:12;font-size:9px;letter-spacing:5px;color:rgba(240,230,200,.25);pointer-events:none;opacity:0;transition:opacity .5s}
#chap.on{opacity:1}

/* ===== 片头 ===== */
#title{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .6s}
#title.on{opacity:1}
.tl-big{font-size:clamp(40px,8vw,64px);font-weight:900;letter-spacing:16px;background:linear-gradient(180deg,var(--pale),var(--gold),#C46A3A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:tlIn 1.5s cubic-bezier(.2,.7,.3,1) both}
.tl-s{font-size:clamp(14px,3vw,20px);letter-spacing:12px;color:rgba(240,230,200,.2);margin-top:2px;animation:tlIn 1.5s cubic-bezier(.2,.7,.3,1) .2s both}
.tl-l{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:16px 0;animation:tlIn 1.5s cubic-bezier(.2,.7,.3,1) .4s both}
@keyframes tlIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

/* ===== 片尾 ===== */
#cred{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity 1s}
#cred.on{opacity:1}
.cr-big{font-size:clamp(24px,5vw,40px);font-weight:900;letter-spacing:8px;background:linear-gradient(180deg,var(--pale),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cr-sub{font-size:10px;letter-spacing:4px;color:rgba(255,255,255,.3);margin-top:8px}
.cr-line{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.1);margin-top:14px;line-height:2;text-align:center}

/* ===== 进度条 ===== */
#progress{position:fixed;bottom:0;left:0;height:2px;background:var(--gold);z-index:30;transition:width .4s cubic-bezier(.4,0,.2,1);pointer-events:none;opacity:.7}

/* ===== 闪白转场 ===== */
.flash{position:fixed;inset:0;z-index:10;background:white;pointer-events:none;opacity:0;transition:opacity .05s}
.flash.fire{opacity:.3;transition:opacity 0s}

/* ===== 转场遮罩 ===== */
#trans-overlay{position:fixed;inset:0;z-index:9;pointer-events:none;opacity:0;transition:opacity .45s cubic-bezier(.4,0,.2,1)}
#trans-overlay.ink{background:radial-gradient(circle, rgba(6,5,12,0.95) 0%, rgba(6,5,12,0.6) 60%, transparent 100%);background-size:0% 0%;background-position:center;background-repeat:no-repeat;transition:all .55s cubic-bezier(.6,0,.4,1)}
#trans-overlay.ink.in{background-size:220% 220%;opacity:1}
#trans-overlay.ink.out{background-size:220% 220%;opacity:0;transition:all .7s cubic-bezier(.2,.8,.3,1)}
#trans-overlay.mist{background:radial-gradient(ellipse at center, rgba(180,200,220,0.35) 0%, rgba(160,180,200,0.12) 50%, transparent 80%);opacity:0;transition:opacity .6s}
#trans-overlay.mist.in{opacity:1}
#trans-overlay.mist.out{opacity:0;transition:opacity .9s}
#trans-overlay.flash-type{background:rgba(220,210,180,0.7);opacity:0;transition:opacity .25s}
#trans-overlay.flash-type.in{opacity:1}
#trans-overlay.flash-type.out{opacity:0;transition:opacity .5s}

/* ===== 神鸟画布 ===== */
#bird-canvas{position:fixed;inset:0;z-index:5;pointer-events:none}

/* ===== 瑶池水面画布 ===== */
#pool-canvas{position:fixed;inset:0;z-index:8;pointer-events:none}

/* ===== 西王母光轮画布 ===== */
#queen-canvas{position:fixed;inset:0;z-index:7;pointer-events:none}

/* ===== 神树光芒画布 ===== */
#tree-canvas{position:fixed;inset:0;z-index:6;pointer-events:none}

/* ===== 神树提示 ===== */
#tree-hint{position:fixed;top:22%;left:50%;transform:translateX(-50%);z-index:11;color:rgba(212,168,83,0.5);font-size:16px;letter-spacing:5px;pointer-events:none;opacity:0;transition:opacity 0.6s;text-align:center}
#tree-hint.show{opacity:1}

/* ===== 粒子 ===== */
#particles{position:fixed;inset:0;z-index:3;pointer-events:none}

/* ===== UI 提示 ===== */
#hint{position:fixed;bottom:6%;left:50%;transform:translateX(-50%);z-index:10;color:rgba(240,230,200,0.45);font-size:16px;letter-spacing:4px;text-align:center;pointer-events:none;animation:hintFade 3s ease-out both}
@keyframes hintFade{0%{opacity:0;transform:translateX(-50%) translateY(6px)}50%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(0)}}

#hint2{position:fixed;bottom:6%;left:50%;transform:translateX(-50%);z-index:10;color:rgba(240,230,200,0.35);font-size:14px;letter-spacing:3px;text-align:center;pointer-events:none;opacity:0;animation:hintFade2 3s ease-out 5.5s both}
@keyframes hintFade2{0%{opacity:0}40%{opacity:1}100%{opacity:0}}

/* ===== 墨圈计数 ===== */
#inkcount{position:fixed;top:24px;right:24px;z-index:10;color:rgba(212,168,83,0.35);font-size:10px;letter-spacing:3px;pointer-events:none}

/* ===== 窗雾提示 ===== */
#fog-hint{position:fixed;top:22%;left:50%;transform:translateX(-50%);z-index:11;color:rgba(180,210,240,0.5);font-size:16px;letter-spacing:4px;pointer-events:none;opacity:0;transition:opacity .8s;text-align:center}
#fog-hint.show{opacity:1}

/* ===== 场景交互提示 ===== */
#scene-hint{position:fixed;top:18%;left:50%;transform:translateX(-50%);z-index:13;pointer-events:none;opacity:0;transition:opacity .8s;text-align:center}
#scene-hint.show{opacity:1}
#scene-hint-inner{display:inline-block;padding:14px 28px;border:0.5px solid rgba(212,168,83,0.2);border-radius:16px;background:rgba(6,5,15,0.45);backdrop-filter:blur(6px)}
#scene-hint-icon{font-size:24px;margin-bottom:6px}
#scene-hint-text{font-size:16px;letter-spacing:4px;color:rgba(212,168,83,0.7);line-height:1.6}
#scene-hint-sub{font-size:12px;letter-spacing:2px;color:rgba(200,180,140,0.4);margin-top:4px}

/* 交互涟漪反馈 */
.interact-ripple{position:fixed;z-index:6;pointer-events:none;border-radius:50%;border:1px solid rgba(212,168,83,0.4);animation:rippleOut 0.8s ease-out both}
@keyframes rippleOut{from{transform:scale(0);opacity:0.7}to{transform:scale(4);opacity:0}}

/* ===== 觉醒进度条（墨迹→青鸟） ===== */
#awaken-bar-wrap{position:fixed;bottom:24%;left:50%;transform:translateX(-50%);z-index:12;pointer-events:none;opacity:0;transition:opacity .8s;display:flex;flex-direction:column;align-items:center;gap:4px}
#awaken-bar-wrap.show{opacity:1}
#awaken-label{font-size:9px;letter-spacing:4px;color:rgba(212,168,83,0.45)}
#awaken-track{width:clamp(160px,40vw,260px);height:2px;background:rgba(255,255,255,0.06);border-radius:1px;overflow:hidden}
#awaken-fill{height:100%;width:0%;background:linear-gradient(90deg,rgba(60,180,200,0.8),rgba(120,230,235,0.95),rgba(212,168,83,0.7));border-radius:1px;transition:width .4s cubic-bezier(.2,.8,.3,1)}
#awaken-glow{position:absolute;top:-10px;width:8px;height:22px;border-radius:4px;background:rgba(120,230,235,0.5);filter:blur(6px);pointer-events:none;transition:left .4s cubic-bezier(.2,.8,.3,1)}
#awaken-text{font-size:8px;letter-spacing:3px;color:rgba(200,220,240,0.35);opacity:0;transition:opacity .5s}
#awaken-text.show{opacity:1}

/* ===== 墨字弹出 ===== */
.inkword{position:fixed;z-index:9;pointer-events:none;color:rgba(212,168,83,0.65);font-size:12px;letter-spacing:4px;font-weight:bold;text-shadow:0 0 8px rgba(212,168,83,0.3);animation:wordFloat 2s ease-out both}
@keyframes wordFloat{0%{opacity:0;transform:translate(-50%,-50%) scale(0.7) translateY(0)}15%{opacity:0.7;transform:translate(-50%,-50%) scale(1) translateY(-4px)}70%{opacity:0.4}100%{opacity:0;transform:translate(-50%,-50%) scale(0.85) translateY(-28px)}}

/* ===== 诗卷碎片UI ===== */
#scroll-panel{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:14;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:5px;opacity:0;transition:opacity .6s}
#scroll-panel.show{opacity:1}
#scroll-title{font-size:9px;letter-spacing:5px;color:rgba(212,168,83,0.45)}
#scroll-frags{display:flex;gap:8px;align-items:center}
.frag-slot{width:28px;height:28px;border:0.5px solid rgba(212,168,83,0.25);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;letter-spacing:1px;color:rgba(212,168,83,0.2);transition:all .5s;position:relative;overflow:hidden}
.frag-slot.got{border-color:rgba(212,168,83,0.7);color:rgba(212,168,83,0.9);background:rgba(212,168,83,0.06)}
.frag-slot.got::after{content:'';position:absolute;inset:0;background:radial-gradient(circle,rgba(212,168,83,0.18) 0%,transparent 70%);animation:fragGlow 2s ease-in-out infinite alternate}
@keyframes fragGlow{from{opacity:0.4}to{opacity:1}}
.frag-slot.new-got{animation:fragPop .5s cubic-bezier(.2,.8,.3,1) both}
@keyframes fragPop{0%{transform:scale(0.3);opacity:0}60%{transform:scale(1.25)}100%{transform:scale(1);opacity:1}}

/* ===== 解锁金色片尾 ===== */
#unlock-ending{position:fixed;inset:0;z-index:25;background:rgba(6,5,15,0);pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;opacity:0;transition:opacity 1.2s}
#unlock-ending.on{opacity:1;background:rgba(6,5,15,0.92)}
#unlock-poem{display:flex;flex-direction:column;align-items:center;gap:18px}
.unlock-line{font-size:clamp(15px,3.5vw,22px);letter-spacing:10px;color:rgba(212,168,83,0);font-weight:700;text-align:center;text-shadow:0 0 30px rgba(212,168,83,0);transition:color 1.2s,text-shadow 1.2s}
.unlock-line.lit{color:rgba(240,230,200,0.95);text-shadow:0 0 40px rgba(212,168,83,0.6)}
#unlock-title{font-size:clamp(9px,2vw,12px);letter-spacing:8px;color:rgba(212,168,83,0);margin-top:32px;transition:color 1.5s}
#unlock-title.lit{color:rgba(212,168,83,0.7)}
#unlock-sub{font-size:clamp(8px,1.8vw,11px);letter-spacing:5px;color:rgba(255,255,255,0);margin-top:10px;transition:color 1.5s}
#unlock-sub.lit{color:rgba(255,255,255,0.25)}
#unlock-particles{position:absolute;inset:0;pointer-events:none}
#unlock-close{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:5px;color:rgba(212,168,83,0.4);opacity:0;transition:opacity 1s;cursor:pointer;pointer-events:auto}
#unlock-close.show{opacity:1}
</style>
</head>
<body>

<!-- ====== 场景层 ====== -->
<div id="stage">
  <!-- s0 现实层：冷暗书房，与幻境形成对比 -->
  <div class="shot atm-void" id="s0" style="background-image:url('kunlun-images/qingniao_01_study_night.jpg');filter:sepia(0.08) hue-rotate(-8deg) saturate(0.88) contrast(1.15) brightness(1.05)"></div>
  <!-- 幻境层：差异化统一滤镜体系 -->
  <div class="shot atm-chaos" id="s1" style="background-image:url('kunlun-images/aigc_kunlun_01_chaos.jpg');background-position:60% 40%;filter:sepia(0.16) hue-rotate(-10deg) saturate(1.05) contrast(1.1) brightness(0.88)"></div>
  <div class="shot atm-chaos" id="s2" style="background-image:url('kunlun-images/aigc_kunlun_01_chaos.jpg');background-position:30% 50%;filter:sepia(0.16) hue-rotate(-10deg) saturate(1.05) contrast(1.1) brightness(0.88)"></div>
  <div class="shot atm-city" id="s3" style="background-image:url('kunlun-images/aigc_kunlun_02_city.jpg');filter:sepia(0.16) hue-rotate(-10deg) saturate(1.05) contrast(1.1) brightness(0.88)"></div>
  <div class="shot atm-city" id="s4" style="background-image:url('kunlun-images/aigc_kunlun_02_city.jpg');background-position:50% 70%;filter:sepia(0.16) hue-rotate(-10deg) saturate(1.05) contrast(1.1) brightness(0.88)"></div>
  <div class="shot atm-queen" id="s5" style="background-image:url('kunlun-images/aigc_kunlun_03_queen.jpg');filter:sepia(0.16) hue-rotate(-6deg) saturate(1.08) contrast(1.08) brightness(0.90)"></div>
  <div class="shot atm-queen" id="s6" style="background-image:url('kunlun-images/aigc_kunlun_03_queen.jpg');background-position:50% 30%;filter:sepia(0.16) hue-rotate(-6deg) saturate(1.08) contrast(1.08) brightness(0.90)"></div>
  <div class="shot atm-tree" id="s7" style="background-image:url('kunlun-images/aigc_kunlun_04_tree.jpg');filter:sepia(0.14) hue-rotate(-12deg) saturate(1.02) contrast(1.12) brightness(0.86)"></div>
  <div class="shot atm-tree" id="s8" style="background-image:url('kunlun-images/aigc_kunlun_04_tree.jpg');background-position:60% 30%;filter:sepia(0.14) hue-rotate(-12deg) saturate(1.02) contrast(1.12) brightness(0.86)"></div>
  <div class="shot atm-pool" id="s9" style="background-image:url('kunlun-images/aigc_kunlun_05_yaochi.jpg');filter:grayscale(0.45) sepia(0.38) hue-rotate(-18deg) saturate(0.35) contrast(1.45) brightness(0.88)"></div>
  <div class="shot atm-pool" id="s10" style="background-image:url('kunlun-images/aigc_kunlun_05_yaochi.jpg');background-position:30% 60%;filter:grayscale(0.45) sepia(0.38) hue-rotate(-18deg) saturate(0.35) contrast(1.45) brightness(0.88)"></div>
  <div class="shot atm-end" id="s11" style="background-image:url('kunlun-images/aigc_kunlun_06_eternal.jpg');filter:grayscale(0.42) sepia(0.36) hue-rotate(-15deg) saturate(0.38) contrast(1.42) brightness(0.85)"></div>
</div>
<div id="tone-overlay"></div>
<div id="grain"></div>

<div id="mist"></div>
<canvas id="rain-canvas"></canvas>
<canvas id="fog-canvas"></canvas>
<canvas id="ink-canvas"></canvas>

<script>
// ==============================================
// 一、全局状态
// ==============================================
var RC = document.getElementById('rain-canvas'), rctx = RC.getContext('2d');
var FC = document.getElementById('fog-canvas'), fctx = FC.getContext('2d');
var IC = document.getElementById('ink-canvas'), ictx = IC.getContext('2d');
var PC = document.getElementById('particles'), pctx = PC.getContext('2d');
var BC = document.getElementById('bird-canvas'), bctx = BC.getContext('2d');
var TC = document.getElementById('tree-canvas'), tctx = TC.getContext('2d');
var QC = document.getElementById('queen-canvas'), qctx = QC.getContext('2d');
var PC2 = document.getElementById('pool-canvas'), pctx2 = PC2.getContext('2d');
var W, H;
function rs(){ W=RC.width=IC.width=PC.width=BC.width=TC.width=QC.width=PC2.width=FC.width=window.innerWidth; H=RC.height=IC.height=PC.height=BC.height=TC.height=QC.height=PC2.height=FC.height=window.innerHeight; }
rs(); window.addEventListener('resize',rs);

// ★ 关键缺失函数定义（否则 doStep() 运行时立即报错导致黑屏）
var birdActiveScenes = ['s1','s2'];
function isBirdActive(){ return birdActiveScenes.indexOf(currentSceneId) >= 0; }

var treeActiveScenes = ['s7','s8'];
function isTreeActive(){ return treeActiveScenes.indexOf(currentSceneId) >= 0; }

var glowRays = []; var glowParticles = []; var glowRings = [];

function updateBirdSparkles(){}

function queenBurst(x, y, big){
  for(var qi=0; qi<(big?20:8); qi++){
    queenParticles.push(new QueenParticle(x+(Math.random()-0.5)*60, y+(Math.random()-0.5)*40));
  }
  if(big) queenAuras.push(new QueenAura());
}
function queenBloomFull(){
  for(var i=0; i<5; i++) queenAuras.push(new QueenAura());
  spawnQueenBeams();
  for(var j=0; j<40; j++) queenParticles.push(new QueenParticle(W*0.5, H*0.55));
}
function treeBloomFull(){
  var cx = W*0.5, cy = H*0.45;
  // 大幅增强：更多粒子、更大半径、更强发光
  for(var i=0; i<60; i++){
    glowParticles.push({
      x:cx+(Math.random()-0.5)*W*0.5, y:cy+(Math.random()-0.5)*H*0.4,
      vx:(Math.random()-0.5)*2.5, vy:-(0.5+Math.random()*2),
      r:2+Math.random()*6, life:1, decay:0.004+Math.random()*0.008,
      update:function(){this.x+=this.vx;this.y+=this.vy;this.vy-=0.008;this.life-=this.decay;return this.life>0;},
      draw:function(){
        tctx.save();tctx.globalAlpha=this.life*0.9;
        tctx.shadowBlur=18;tctx.shadowColor='rgba(255,200,60,0.7)';
        tctx.fillStyle='rgba(255,215,80,'+(this.life*0.8)+')';
        tctx.beginPath();tctx.arc(this.x,this.y,this.r,0,Math.PI*2);tctx.fill();
        tctx.globalAlpha=this.life*0.3;
        tctx.fillStyle='rgba(255,235,130,'+(this.life*0.4)+')';
        tctx.beginPath();tctx.arc(this.x,this.y,this.r*2.5,0,Math.PI*2);tctx.fill();
        tctx.restore();
      }
    });
  }
  // 更多更大的光圈
  for(var j=0; j<5; j++){
    glowRings.push({
      x:cx, y:cy, r:10, maxR:W*0.35+j*W*0.06, life:1, decay:0.006,
      update:function(){this.r+=(this.maxR-this.r)*0.03;this.life-=this.decay;return this.life>0;},
      draw:function(){
        tctx.save();tctx.globalAlpha=this.life*0.5;
        tctx.strokeStyle='rgba(255,210,80,'+(this.life*0.6)+')';
        tctx.lineWidth=2;tctx.shadowBlur=12;tctx.shadowColor='rgba(255,200,60,0.5)';
        tctx.beginPath();tctx.arc(this.x,this.y,this.r,0,Math.PI*2);tctx.stroke();tctx.restore();
      }
    });
  }
  // 添加金色射线
  for(var k=0; k<8; k++){
    var ang = Math.random()*Math.PI*2;
    glowRays.push({
      x:cx+Math.cos(ang)*20, y:cy+Math.sin(ang)*20,
      len:0, maxLen:100+Math.random()*150, life:1, decay:0.008+Math.random()*0.008,
      update:function(){this.len+=(this.maxLen-this.len)*0.05;this.life-=this.decay;return this.life>0;},
      draw:function(){
        tctx.save();tctx.globalAlpha=this.life*0.5;
        var g=tctx.createLinearGradient(this.x,this.y,this.x+Math.cos(ang)*this.len,this.y+Math.sin(ang)*this.len);
        g.addColorStop(0,'rgba(255,210,80,'+(this.life*0.7)+')');
        g.addColorStop(1,'rgba(255,210,80,0)');
        tctx.strokeStyle=g;tctx.lineWidth=2;tctx.shadowBlur=6;tctx.shadowColor='rgba(255,200,60,0.3)';
        tctx.beginPath();tctx.moveTo(this.x,this.y);tctx.lineTo(this.x+Math.cos(ang)*this.len,this.y+Math.sin(ang)*this.len);tctx.stroke();tctx.restore();
      }
    });
  }
}
function treeGlow(x, y, big){
  // 大幅增强：更多粒子、更大半径、更强发光
  var count = big ? 35 : 12;
  for(var i=0; i<count; i++){
    glowParticles.push({
      x:x+(Math.random()-0.5)*80, y:y+(Math.random()-0.5)*60,
      vx:(Math.random()-0.5)*2.5, vy:-(0.5+Math.random()*2),
      r:2+Math.random()*5, life:1, decay:0.006+Math.random()*0.01,
      update:function(){this.x+=this.vx;this.y+=this.vy;this.vy-=0.01;this.life-=this.decay;return this.life>0;},
      draw:function(){
        tctx.save();
        tctx.globalAlpha=this.life*0.9;
        tctx.shadowBlur=15;
        tctx.shadowColor='rgba(255,200,60,0.6)';
        tctx.fillStyle='rgba(255,210,80,'+(this.life*0.8)+')';
        tctx.beginPath();tctx.arc(this.x,this.y,this.r,0,Math.PI*2);tctx.fill();
        // 外层光晕
        tctx.globalAlpha=this.life*0.3;
        tctx.fillStyle='rgba(255,230,120,'+(this.life*0.4)+')';
        tctx.beginPath();tctx.arc(this.x,this.y,this.r*2.5,0,Math.PI*2);tctx.fill();
        tctx.restore();
      }
    });
  }
  // 添加光圈涟漪
  glowRings.push({
    x:x, y:y, r:5, maxR:big?W*0.2:W*0.12, life:1, decay:0.012,
    update:function(){this.r+=(this.maxR-this.r)*0.04;this.life-=this.decay;return this.life>0;},
    draw:function(){
      tctx.save();tctx.globalAlpha=this.life*0.5;
      tctx.strokeStyle='rgba(255,210,80,'+(this.life*0.6)+')';
      tctx.lineWidth=2;tctx.shadowBlur=10;tctx.shadowColor='rgba(255,200,60,0.5)';
      tctx.beginPath();tctx.arc(this.x,this.y,this.r,0,Math.PI*2);tctx.stroke();tctx.restore();
    }
  });
  // 添加向上射线
  for(var j=0;j<(big?4:2);j++){
    glowRays.push({
      x:x+(Math.random()-0.5)*40, y:y,
      len:0, maxLen:80+Math.random()*120, life:1, decay:0.01+Math.random()*0.01,
      update:function(){this.len+=(this.maxLen-this.len)*0.06;this.life-=this.decay;return this.life>0;},
      draw:function(){
        tctx.save();tctx.globalAlpha=this.life*0.4;
        var g=tctx.createLinearGradient(this.x,this.y,this.x,this.y-this.len);
        g.addColorStop(0,'rgba(255,210,80,'+(this.life*0.8)+')');
        g.addColorStop(1,'rgba(255,210,80,0)');
        tctx.strokeStyle=g;tctx.lineWidth=2;tctx.shadowBlur=8;tctx.shadowColor='rgba(255,200,60,0.4)';
        tctx.beginPath();tctx.moveTo(this.x,this.y);tctx.lineTo(this.x,this.y-this.len);tctx.stroke();tctx.restore();
      }
    });
  }
}

// ==============================================
// ★ 诗卷拼合系统
// ==============================================
// 每章对应的场景shot和碎片索引
var POEM_FRAGS = [
  {shots:['s1','s2'], idx:0, label:'混'},  // 壹·混沌初开
  {shots:['s3','s4'], idx:1, label:'昆'},  // 贰·昆仑墟
  {shots:['s5','s6'], idx:2, label:'王'},  // 叁·西王母
  {shots:['s7','s8'], idx:3, label:'树'},  // 肆·不死树
  {shots:['s9','s10'],idx:4, label:'池'},  // 伍·瑶池
];
var collectedFrags = [false,false,false,false,false];
var scrollPanel = document.getElementById('scroll-panel');
var unlockEnding = document.getElementById('unlock-ending');

function getFragIdxByShot(shotId){
  for(var fi=0;fi<POEM_FRAGS.length;fi++){
    var pf=POEM_FRAGS[fi];
    for(var si=0;si<pf.shots.length;si++){
      if(pf.shots[si]===shotId) return pf.idx;
    }
  }
  return -1;
}

function collectFrag(idx){
  if(idx<0||idx>4||collectedFrags[idx]) return;
  collectedFrags[idx]=true;
  var slot=document.getElementById('frag'+idx);
  if(slot){
    slot.classList.add('got');
    slot.classList.add('new-got');
    setTimeout(function(){ slot.classList.remove('new-got'); },600);
  }
  // 碎片获得提示
  showFragToast(POEM_FRAGS[idx].label);
  // 检查是否全部集齐
  var allGot=collectedFrags[0]&&collectedFrags[1]&&collectedFrags[2]&&collectedFrags[3]&&collectedFrags[4];
  if(allGot){
    setTimeout(triggerUnlockEnding, 1200);
  }
}

function showFragToast(label){
  var d=document.createElement('div');
  d.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:22;pointer-events:none;color:rgba(212,168,83,0.9);font-size:clamp(28px,6vw,48px);font-weight:900;letter-spacing:12px;text-shadow:0 0 40px rgba(212,168,83,0.7);animation:fragToast .9s cubic-bezier(.2,.8,.3,1) both';
  d.textContent='「'+label+'」';
  if(!document.getElementById('fragToastStyle')){
    var s=document.createElement('style');
    s.id='fragToastStyle';
    s.textContent='@keyframes fragToast{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}40%{opacity:1;transform:translate(-50%,-60%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-80%) scale(0.9)}}';
    document.head.appendChild(s);
  }
  document.body.appendChild(d);
  setTimeout(function(){ document.body.removeChild(d); },1000);
}

// 触发解锁金色片尾
function triggerUnlockEnding(){
  unlockEnding.classList.add('on');
  scrollPanel.style.display='none';
  // 粒子画布
  var upc=document.getElementById('unlock-particles');
  upc.width=window.innerWidth; upc.height=window.innerHeight;
  var upctx=upc.getContext('2d');
  var uParticles=[];
  for(var up=0;up<120;up++){
    uParticles.push({
      x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
      vx:(Math.random()-0.5)*0.8, vy:-(Math.random()*0.6+0.2),
      r:Math.random()*1.5+0.3, life:Math.random(),
      decay:Math.random()*0.003+0.001
    });
  }
  (function upLoop(){
    if(!unlockEnding.classList.contains('on')) return;
    requestAnimationFrame(upLoop);
    upctx.clearRect(0,0,upc.width,upc.height);
    for(var ui=0;ui<uParticles.length;ui++){
      var up2=uParticles[ui];
      up2.x+=up2.vx+Math.sin(up2.y*0.005)*0.12;
      up2.y+=up2.vy;
      up2.life-=up2.decay;
      if(up2.life<=0){
        up2.x=Math.random()*upc.width; up2.y=upc.height+10;
        up2.life=0.6+Math.random()*0.4;
      }
      upctx.beginPath();
      upctx.arc(up2.x,up2.y,up2.r*up2.life,0,Math.PI*2);
      upctx.fillStyle='rgba(212,168,83,'+(up2.life*0.5)+')';
      upctx.fill();
    }
  })();
  // 逐行点亮诗句
  var lines=['uline0','uline1','uline2','uline3','uline4'];
  for(var li=0;li<lines.length;li++){
    (function(i){
      setTimeout(function(){
        document.getElementById(lines[i]).classList.add('lit');
      }, 800+i*700);
    })(li);
  }
  setTimeout(function(){
    document.getElementById('unlock-title').classList.add('lit');
  }, 800+lines.length*700+200);
  setTimeout(function(){
    document.getElementById('unlock-sub').classList.add('lit');
  }, 800+lines.length*700+600);
  setTimeout(function(){
    var uc=document.getElementById('unlock-close');
    uc.classList.add('show');
    uc.onclick=function(){
      unlockEnding.classList.remove('on');
      setTimeout(function(){
        unlockEnding.style.display='none';
      },1300);
    };
    uc.ontouchstart=function(e){ e.stopPropagation(); uc.onclick(); };
  }, 800+lines.length*700+1800);
}

// 诗卷面板在第一次进入场景后显示
var scrollShown=false;
function maybeShowScroll(shotId){
  if(!scrollShown && shotId && shotId!=='s0'){
    scrollShown=true;
    scrollPanel.classList.add('show');
  }
  var fi=getFragIdxByShot(shotId);
  if(fi>=0) collectFrag(fi);
}

// 转场引擎
function doTransition(type, callback){
  if(transBusy){ callback(); return; }
  transBusy = true;
  var to = transOverlay;

  if(type === 'none'){
    callback();
    transBusy = false;
    return;
  }

  if(type === 'ink'){
    // 墨染：黑墨从中心扩散覆盖画面 → 切换 → 墨收
    to.className = 'ink';
    to.style.backgroundSize = '0% 0%';
    to.style.opacity = '1';
    requestAnimationFrame(function(){
      to.classList.add('in');
    });
    setTimeout(function(){
      callback(); // 画面切换
      // 墨收起
      to.classList.remove('in');
      to.classList.add('out');
      setTimeout(function(){
        to.className = '';
        to.style.backgroundSize = '';
        to.style.opacity = '';
        transBusy = false;
      }, 700);
    }, 520);
  } else if(type === 'mist'){
    // 雾隐：mist加深 → 切换 → 雾散
    mistEl.style.transition = 'opacity 0.55s';
    mistEl.style.opacity = '0.7';
    setTimeout(function(){
      callback();
      mistEl.style.transition = 'opacity 0.9s';
      mistEl.style.opacity = '1';
      setTimeout(function(){
        mistEl.style.transition = 'opacity 2s';
        transBusy = false;
      }, 900);
    }, 500);
  } else if(type === 'flash'){
    // 渐强闪白
    to.className = 'flash-type';
    to.style.opacity = '1';
    to.classList.add('in');
    setTimeout(function(){
      callback();
      to.classList.remove('in');
      to.classList.add('out');
      setTimeout(function(){
        to.className = '';
        to.style.opacity = '';
        transBusy = false;
      }, 500);
    }, 230);
  }
}

// 逐字出现：将文字拆成span，每个带递增animation-delay（跳过HTML标签不拆）
function charByChar(str, cls, baseDelay){
  var html = '', delay = 0, i = 0;
  while(i < str.length){
    if(str[i] === '<'){
      // 找到标签结尾，整体保留不拆
      var j = str.indexOf('>', i);
      if(j >= 0){ html += str.substring(i, j+1); i = j+1; continue; }
    }
    var c = str[i];
    if(c === '\n' || c === '\r'){ html += '<br>'; i++; continue; }
    var display = c === ' ' ? '&nbsp;' : c.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html += '<span class="'+cls+'" style="animation-delay:'+delay+'ms">'+display+'</span>';
    delay += baseDelay;
    i++;
  }
  return html;
}

// 字幕显示延时回调追踪——防止场景切换时旧回调仍执行导致字幕重叠
var _pendingShows = [];

function doStep(i){
  tlIdx = i; var t = TL[i]; var elapsed = 0;

  // 清除所有待执行的字幕显示回调
  for(var pi=0; pi<_pendingShows.length; pi++) clearTimeout(_pendingShows[pi]);
  _pendingShows = [];

  // 强制立即隐藏所有文字层，跳过CSS渐变避免新旧字幕重叠
  subEl.style.transition = 'none'; subEl.classList.remove('on'); subEl.style.opacity = '0';
  subLineEl.textContent = '';  // 清空内容，杜绝残留
  interEl.style.transition = 'none'; interEl.classList.remove('on'); interEl.style.opacity = '0';
  interTextEl.innerHTML = '';   // 清空内容，杜绝残留
  chapEl.style.transition = 'none'; chapEl.classList.remove('on'); chapEl.style.opacity = '0';
  chapEl.textContent = '';      // 清空内容，杜绝残留
  titleEl.style.transition = 'none'; titleEl.classList.remove('on'); titleEl.style.opacity = '0';
  credEl.style.transition = 'none'; credEl.classList.remove('on'); credEl.style.opacity = '0';
  // 下一帧恢复transition
  requestAnimationFrame(function(){
    subEl.style.transition = ''; interEl.style.transition = '';
    chapEl.style.transition = ''; titleEl.style.transition = '';
    credEl.style.transition = '';
    subEl.style.opacity = ''; interEl.style.opacity = '';
    chapEl.style.opacity = ''; titleEl.style.opacity = '';
    credEl.style.opacity = '';
  });

  // 更新墨迹交互状态
  currentSceneId = t.shot;

  // ★ 窗雾：s0 激活时初始化，离开时销毁
  if(t.shot === 's0'){
    setTimeout(function(){ initFog(); }, 600);
    // 显示窗雾提示
    setTimeout(function(){
      if(isFogActive()){ fogHint.classList.add('show'); setTimeout(function(){fogHint.classList.remove('show');}, 5000); }
    }, 2000);
  } else {
    if(fogCanvas) destroyFog();
    awakenBarWrap.classList.remove('show');
    awakenText.classList.remove('show');
  }

  // ★ 诗卷收集：进入场景时检查
  maybeShowScroll(t.shot);

  // 更新神鸟状态
  if(isBirdActive() && !bird.active){
    bird.reset();
  } else if(!isBirdActive() && bird.active){
    bird.deactivate();
    setTimeout(function(){ bird.visible = false; }, 1500);
  }

  // 更新仙鹤状态
  if(isCraneActive()){
    for(var cri=0; cri<cranes.length; cri++){
      if(!cranes[cri].active) cranes[cri].reset();
    }
  }

  var start = Date.now();

  if(t.type === 'title'){
    hideAllShots();
    titleEl.classList.add('on');
    mistEl.style.opacity = '1';
  } else if(t.type === 'credits'){
    hideAllShots(); credEl.classList.add('on'); prog.style.width = '100%';
    mistEl.style.opacity = '0';
  } else if(t.type === 'inter'){
    hideAllShots();
    interTextEl.innerHTML = charByChar(t.text || '', 'ch', 80);
    // 延迟淡入，和sub/chap一样等待上一帧隐藏生效后再显示
    var _tid = setTimeout(function(){ interEl.classList.add('on'); }, 300);
    _pendingShows.push(_tid);
  } else {
    var transType = t.trans || 'flash';
    doTransition(transType, function(){
      hideAllShots();
      var shot = document.getElementById(t.shot);
      shot.classList.add('on');
      if(t.type) shot.classList.add(t.type);
      // 字幕和章节延迟淡入，避免与转场动画冲突
      subEl.classList.remove('sub-right'); // 先清除竖排模式
      if(t.chap){
        chapEl.textContent = t.chap;
        var _ctid = setTimeout(function(){ chapEl.classList.add('on'); }, 400);
        _pendingShows.push(_ctid);
      }
      if(t.sub){
        if(t.shot === 's6') subEl.classList.add('sub-right');
        try { subLineEl.innerHTML = charByChar(t.sub, 'ch', 60); } catch(e){ subLineEl.innerText = t.sub; }
        var _stid = setTimeout(function(){ subEl.classList.add('on'); }, 600);
        _pendingShows.push(_stid);
      }
    });
  }

  clearInterval(tlTimer);
  tlTimer = setInterval(function(){
    elapsed = Date.now() - start;
    var done = 0;
    for(var j=0; j<i; j++) done += TL[j].dur;
    done += Math.min(elapsed, TL[i].dur);
    prog.style.width = (done/totalDur*100) + '%';

    if(elapsed >= TL[i].dur){
      clearInterval(tlTimer);
      if(i+1 < TL.length) doStep(i+1);
    }
  }, 150);
}

var pts = [];
function P(x,y,c){
  this.x = x||Math.random()*W; this.y = y||Math.random()*H;
  this.vx = (Math.random()-.5)*.3; this.vy = -(Math.random()*.4+.05);
  this.r = Math.random()*1+.2; this.life = 1; this.decay = Math.random()*.0015+.0008;
  this.c = c||'rgba(212,168,83,';
}
P.prototype.up = function(){
  this.x += this.vx + Math.sin(this.y*.005)*.08; this.y += this.vy; this.life -= this.decay; return this.life>0;
};
P.prototype.dr = function(){
  pctx.beginPath(); pctx.arc(this.x,this.y,this.r*this.life,0,Math.PI*2);
  pctx.fillStyle = this.c + (this.life*.35) + ')'; pctx.fill();
};

// 四、雨滴系统
// ==============================================
var Drops = [], Ripples = [];

function RainDrop(){ this.reset(); }
RainDrop.prototype.reset = function(){
  this.x = Math.random()*W; this.y = -20-Math.random()*60;
  this.len = 12+Math.random()*22; this.speed = 6+Math.random()*8;
  this.thick = 0.25+Math.random()*0.5; this.alpha = 0.1+Math.random()*0.25;
  this.angle = 0.12;
};
RainDrop.prototype.update = function(){
  this.x += this.speed*Math.sin(this.angle); this.y += this.speed*Math.cos(this.angle);
  if(this.y > H+20){
    if(Math.random()<0.06){ Ripples.push(new SplashRipple(this.x, H*(0.65+Math.random()*0.2))); }
    this.reset();
  }
};
RainDrop.prototype.draw = function(){
  rctx.beginPath(); rctx.moveTo(this.x,this.y);
  rctx.lineTo(this.x+this.len*Math.sin(this.angle),this.y+this.len*Math.cos(this.angle));
  rctx.strokeStyle = 'rgba(180,210,240,'+this.alpha+')'; rctx.lineWidth = this.thick; rctx.stroke();
};

function SplashRipple(x,y,big){
  this.x=x; this.y=y; this.r=0;
  this.maxR = big?60+Math.random()*40:8+Math.random()*16;
  this.alpha = big?0.6:0.35; this.speed = big?1.8:1.2; this.big = big||false;
}
SplashRipple.prototype.update = function(){
  this.r+=this.speed; this.alpha*=0.962; return this.alpha>0.01&&this.r<this.maxR*1.2;
};
SplashRipple.prototype.draw = function(){
  rctx.beginPath(); rctx.ellipse(this.x,this.y,this.r,this.r*0.38,0,0,Math.PI*2);
  rctx.strokeStyle = 'rgba(180,210,240,'+this.alpha+')'; rctx.lineWidth = this.big?1.5:0.8; rctx.stroke();
};

for(var i=0; i<140; i++){ var d=new RainDrop(); d.y=Math.random()*H; Drops.push(d); }

var WindowDrops = [];
function WinDrop(){
  this.x = W*0.12+Math.random()*W*0.72; this.y = H*0.05+Math.random()*H*0.1;
  this.len = 18+Math.random()*35; this.speed = 0.4+Math.random()*1.2;
  this.alpha = 0.06+Math.random()*0.12; this.width = 0.5+Math.random()*0.8;
}
WinDrop.prototype.update = function(){
  this.y+=this.speed;
  if(this.y>H*0.58){ this.y=H*0.05+Math.random()*H*0.08; this.x=W*0.12+Math.random()*W*0.72; }
};
WinDrop.prototype.draw = function(){
  rctx.beginPath(); rctx.moveTo(this.x,this.y); rctx.lineTo(this.x,this.y+this.len);
  var grad=rctx.createLinearGradient(this.x,this.y,this.x,this.y+this.len);
  grad.addColorStop(0,'rgba(160,200,230,0)'); grad.addColorStop(0.5,'rgba(160,200,230,'+this.alpha+')'); grad.addColorStop(1,'rgba(160,200,230,0)');
  rctx.strokeStyle=grad; rctx.lineWidth=this.width; rctx.stroke();
};
for(var wi=0; wi<55; wi++) WindowDrops.push(new WinDrop());

var inkStrokes=[], currentStroke=null, inkCount=0, isDrawing=false;

function InkCircle(x,y,big){
  this.cx=x; this.cy=y; this.big=big||false;
  var n=this.big?5:3;
  var baseR=this.big?(80+Math.random()*40):(30+Math.random()*25);
  var delay=this.big?10:7;
  this.rings=[];
  for(var i=0;i<n;i++){
    this.rings.push({
      r:0, maxR:baseR*(0.55+i*0.12),
      alpha:this.big?(0.72-i*0.10):(0.65-i*0.12),
      delay:i*delay, speed:this.big?(2.2+i*0.3):(1.4+i*0.2),
      lineW:this.big?(2.8-i*0.35):(2-i*0.3), started:false
    });
  }
  this.frame=0;
}
InkCircle.prototype.update = function(){
  this.frame++; var anyAlive=false;
  for(var i=0;i<this.rings.length;i++){
    var ring=this.rings[i];
    if(this.frame<ring.delay){anyAlive=true;continue;}
    ring.started=true; ring.r+=ring.speed;
    if(ring.r>=ring.maxR) ring.alpha-=this.big?0.012:0.018;
    if(ring.alpha>0.005) anyAlive=true;
  }
  return anyAlive;
};
InkCircle.prototype.draw = function(){
  for(var i=0;i<this.rings.length;i++){
    var ring=this.rings[i];
    if(!ring.started||ring.alpha<=0.005) continue;
    ictx.beginPath(); ictx.arc(this.cx,this.cy,Math.max(0,ring.r),0,Math.PI*2);
    ictx.strokeStyle='rgba(10,8,16,'+ring.alpha+')'; ictx.lineWidth=Math.max(0.3,ring.lineW); ictx.stroke();
  }
};
var inkCircles=[];

function Stroke(){ this.pts=[]; this.alpha=0.88; this.born=Date.now(); }
Stroke.prototype.addPt = function(x,y){ this.pts.push({x:x,y:y}); };
Stroke.prototype.update = function(){
  var age=(Date.now()-this.born)/1000; if(age>3) this.alpha-=0.006; return this.alpha>0.01;
};
Stroke.prototype.draw = function(){
  if(this.pts.length<2) return;
  ictx.beginPath(); ictx.moveTo(this.pts[0].x,this.pts[0].y);
  for(var i=1;i<this.pts.length;i++){
    var mx=(this.pts[i-1].x+this.pts[i].x)/2, my=(this.pts[i-1].y+this.pts[i].y)/2;
    ictx.quadraticCurveTo(this.pts[i-1].x,this.pts[i-1].y,mx,my);
  }
  ictx.strokeStyle='rgba(8,6,14,'+this.alpha+')'; ictx.lineWidth=4+Math.random()*1.5;
  ictx.lineCap='round'; ictx.lineJoin='round'; ictx.stroke();
};

function InkDrip(x,y){
  this.x=x; this.y=y; this.vy=0.5+Math.random()*1.5; this.r=1.5+Math.random()*2.5;
  this.alpha=0.7; this.life=120+Math.random()*80; this.age=0;
}
InkDrip.prototype.update = function(){
  this.y+=this.vy; this.vy*=0.98; this.age++;
  if(this.age>this.life-40) this.alpha-=0.02; return this.age<this.life&&this.alpha>0.01;
};
InkDrip.prototype.draw = function(){
  ictx.beginPath(); ictx.arc(this.x,this.y,this.r,0,Math.PI*2);
  ictx.fillStyle='rgba(8,6,14,'+this.alpha+')'; ictx.fill();
};

// ==============================================
// 六点二五、窗雾擦拭系统（s0专属）
// ==============================================
// 雾气画布：半透明磨砂层覆盖整个画面，擦拭露出下方场景
var fogAlpha = 0.88;          // 初始雾气浓度
var fogRegenSpeed = 0.00015;  // 雾气自动恢复速度
var fogBrushRadius = 48;      // 擦拭笔刷半径
var fogCleared = false;       // 雾气是否被擦过
var fogCanvas = null;         // 离屏画布存储雾气遮罩

function initFog(){
  FC.style.opacity = '1';
  FC.classList.add('on');
  fogAlpha = 0.88;
  fogCleared = false;
  // 创建离屏雾气画布
  fogCanvas = document.createElement('canvas');
  fogCanvas.width = W; fogCanvas.height = H;
  var fgCtx = fogCanvas.getContext('2d');
  fgCtx.fillStyle = 'rgba(140,170,190,0.88)';
  fgCtx.fillRect(0, 0, W, H);
  // 添加纹理（不均匀的雾气）
  for(var fi=0; fi<60; fi++){
    var fx = Math.random()*W, fy = Math.random()*H;
    var fr = 60 + Math.random()*200;
    var fg = fgCtx.createRadialGradient(fx, fy, 0, fx, fy, fr);
    fg.addColorStop(0, 'rgba(160,190,210,'+(0.15+Math.random()*0.2)+')');
    fg.addColorStop(0.5, 'rgba(150,180,200,'+(0.06+Math.random()*0.08)+')');
    fg.addColorStop(1, 'rgba(140,170,190,0)');
    fgCtx.fillStyle = fg;
    fgCtx.beginPath(); fgCtx.arc(fx, fy, fr, 0, Math.PI*2); fgCtx.fill();
  }
  drawFogToScreen();
}

function wipeFog(x, y){
  if(!fogCanvas) return;
  var fgCtx = fogCanvas.getContext('2d');
  fgCtx.globalCompositeOperation = 'destination-out';
  var wipeGrad = fgCtx.createRadialGradient(x, y, 0, x, y, fogBrushRadius);
  wipeGrad.addColorStop(0, 'rgba(0,0,0,0.75)');
  wipeGrad.addColorStop(0.5, 'rgba(0,0,0,0.35)');
  wipeGrad.addColorStop(1, 'rgba(0,0,0,0)');
  fgCtx.fillStyle = wipeGrad;
  fgCtx.beginPath(); fgCtx.arc(x, y, fogBrushRadius, 0, Math.PI*2); fgCtx.fill();
  fgCtx.globalCompositeOperation = 'source-over';
  fogCleared = true;
  drawFogToScreen();
}

function drawFogToScreen(){
  if(!fogCanvas) return;
  fctx.clearRect(0, 0, W, H);
  fctx.drawImage(fogCanvas, 0, 0);
}

function regenFog(){
  if(!fogCanvas || !fogCleared) return;
  var fgCtx = fogCanvas.getContext('2d');
  fgCtx.globalCompositeOperation = 'source-over';
  // 少量恢复雾气
  for(var ri=0; ri<3; ri++){
    var rx = Math.random()*W, ry = Math.random()*H;
    var rg = fgCtx.createRadialGradient(rx, ry, 0, rx, ry, 30+Math.random()*50);
    rg.addColorStop(0, 'rgba(150,180,200,'+(fogRegenSpeed*80)+')');
    rg.addColorStop(1, 'rgba(150,180,200,0)');
    fgCtx.fillStyle = rg;
    fgCtx.beginPath(); fgCtx.arc(rx, ry, 30+Math.random()*50, 0, Math.PI*2); fgCtx.fill();
  }
  drawFogToScreen();
}

function destroyFog(){
  FC.classList.remove('on');
  FC.style.opacity = '0';
  fogCanvas = null;
  fctx.clearRect(0, 0, W, H);
  fogCleared = false;
}

// 挥手雾气渐散（s0专属）：2.5秒内雾气逐帧淡出，完成后切场景
var fogDissipating = false;
function fogDissipate(onDone){
  if(fogDissipating) return;
  fogDissipating = true;
  var steps = 0, totalSteps = 75; // ~2.5s @ 60fps每2帧一步
  var fadeId = setInterval(function(){
    steps++;
    // 每步降低fogCanvas整体不透明度
    if(fogCanvas){
      var fgCtx = fogCanvas.getContext('2d');
      fgCtx.globalCompositeOperation = 'destination-out';
      fgCtx.fillStyle = 'rgba(0,0,0,0.025)';
      fgCtx.fillRect(0, 0, fogCanvas.width, fogCanvas.height);
      fgCtx.globalCompositeOperation = 'source-over';
      drawFogToScreen();
    }
    if(steps >= totalSteps){
      clearInterval(fadeId);
      destroyFog();
      fogDissipating = false;
      if(onDone) onDone();
    }
  }, 33);
}

// 六点三零、墨迹觉醒系统（s0专属）
// ==============================================
var AWAKEN_THRESHOLD = 8;     // 需要 8 个墨圈触发觉醒
var awakenProgress = 0;        // 0-1
var awakenTriggered = false;
var awakenBarWrap = document.getElementById('awaken-bar-wrap');
var awakenFill = document.getElementById('awaken-fill');
var awakenGlow = document.getElementById('awaken-glow');
var awakenText = document.getElementById('awaken-text');
var fogHint = document.getElementById('fog-hint');

function updateAwaken(newCount){
  if(awakenTriggered || !isFogActive()) return;
  awakenProgress = Math.min(1, newCount / AWAKEN_THRESHOLD);
  awakenFill.style.width = (awakenProgress * 100) + '%';
  awakenGlow.style.left = (awakenProgress * 100) + '%';
  // 显示进度条
  if(awakenProgress > 0 && !awakenBarWrap.classList.contains('show')){
    awakenBarWrap.classList.add('show');
  }
  // 文字提示
  if(awakenProgress > 0.35 && !awakenText.classList.contains('show')){
    awakenText.classList.add('show');
  }
  // 显示窗雾提示
  if(newCount >= 2 && !fogCleared){
    fogHint.classList.add('show');
    setTimeout(function(){ fogHint.classList.remove('show'); }, 4000);
  }
  // 觉醒触发！
  if(awakenProgress >= 1 && !awakenTriggered){
    awakenTriggered = true;
    triggerAwakening();
  }
}

function triggerAwakening(){
  // 觉醒动画：墨圈发光 → 青鸟从墨中飞出 → 自然转场
  var cx = W * 0.5, cy = H * 0.5;

  // 1) 全屏墨晕加深
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;z-index:11;pointer-events:none;background:radial-gradient(circle at 50% 50%, rgba(8,20,30,0.6) 0%, rgba(6,5,15,0.9) 100%);opacity:0;transition:opacity 1.2s';
  document.body.appendChild(overlay);
  requestAnimationFrame(function(){ overlay.style.opacity = '1'; });

  // 2) 觉醒文字
  var awWord = document.createElement('div');
  awWord.style.cssText = 'position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);z-index:13;pointer-events:none;color:rgba(120,230,235,0.95);font-size:clamp(20px,5vw,36px);font-weight:900;letter-spacing:14px;text-shadow:0 0 50px rgba(60,200,210,0.8);opacity:0;transition:opacity .8s';
  awWord.textContent = '青 鸟 醒 来';
  document.body.appendChild(awWord);
  setTimeout(function(){ awWord.style.opacity = '1'; }, 400);

  // 3) 粒子爆发（青蓝色光点从墨中心飞散）
  for(var ai=0; ai<60; ai++){
    var ang = Math.random()*Math.PI*2;
    var spd = 2+Math.random()*6;
    pts.push(new P(cx, cy, 'rgba(80,210,220,'));
    var p2 = pts[pts.length-1];
    p2.vx = Math.cos(ang)*spd;
    p2.vy = Math.sin(ang)*spd - 1;
    p2.decay = 0.008+Math.random()*0.015;
  }

  // 4) 隐藏雾气 + 进度条
  setTimeout(function(){
    destroyFog();
    awakenBarWrap.classList.remove('show');
  }, 600);

  // 5) 青鸟从墨中升起 —— 使用微鸟粒子模拟
  setTimeout(function(){
    // 青鸟形粒子云
    for(var bi=0; bi<40; bi++){
      var bx = cx + (Math.random()-0.5)*80;
      var by = cy - 30 + (Math.random()-0.5)*40;
      pts.push(new P(bx, by, Math.random()<0.5?'rgba(60,210,220,':'rgba(120,240,235,'));
      var bp = pts[pts.length-1];
      bp.vy = -(1+Math.random()*2);
      bp.vx = (Math.random()-0.5)*1.5;
      bp.decay = 0.008+Math.random()*0.015;
      bp.r = 1+Math.random()*2.5;
    }
    // 文字渐变
    awWord.style.transition = 'all 1.5s';
    awWord.style.opacity = '0';
    awWord.style.transform = 'translate(-50%,-80%)';
  }, 1200);

  // 6) 清理 → 自然推进时间线到 s1
  setTimeout(function(){
    try{ document.body.removeChild(overlay); }catch(e){}
    try{ document.body.removeChild(awWord); }catch(e){}

    // 跳到青鸟飞出场景 (s1 混沌初开)
    clearTimeout(tlTimer);
    var s1Idx = -1;
    for(var ti=0; ti<TL.length; ti++){
      if(TL[ti].shot === 's1'){ s1Idx = ti; break; }
    }
    if(s1Idx > 0) doStep(s1Idx);
  }, 2800);
}

// 重写 inkScenes 逻辑：s0 既是墨迹也是窗雾场景
// 修改 inkCount 更新以驱动觉醒
var _origInkCountInc = null;

// 在墨迹 mousedown 中接入觉醒系统
// 六点五、青色神鸟系统（s1 混沌初开 / s2 青鸟飞出）
// ==============================================
BC.width = W; BC.height = H;

// 神鸟对象
var bird = {
  x: 0, y: 0,
  baseX: 0, baseY: 0,
  vx: 0, vy: 0,
  scale: 1.5,
  wingPhase: 0, wingSpeed: 0.05,
  active: false, visible: false,
  sparkles: [],
  guided: false, guideX: 0, guideY: 0, guideTimer: 0,
  sceneStart: 0,

  reset: function(){
    this.x = W * 0.72;
    this.y = H * 0.38;
    this.baseX = W * 0.45;
    this.baseY = H * 0.38;
    this.vx = -0.8;
    this.vy = -0.15;
    this.wingPhase = 0;
    this.scale = 1.4;
    this.sparkles = [];
    this.guided = false;
    this.guideTimer = 0;
    this.active = true;
    this.visible = true;
    this.sceneStart = Date.now();
    BC.style.pointerEvents = 'auto';
  },

  deactivate: function(){
    this.active = false;
    this.vx = -3;
    this.vy = -0.5;
    BC.style.pointerEvents = 'none';
  },

  update: function(){
    if(!this.active) {
      this.x += this.vx; this.y += this.vy;
      if(this.x < -300) this.visible = false;
      return;
    }
    // 风筝模式：位置由 birdKiteTick 直接控制，update只处理非手势状态
    if(this._kiteMode){
      // wingPhase已由birdKiteTick递增，这里不再重复
      return;
    }
    if(this.guided){
      var dx = this.guideX - this.x, dy = this.guideY - this.y;
      var dist = Math.sqrt(dx*dx+dy*dy);
      if(dist > 4){ this.vx = dx/dist*3.5; this.vy = dy/dist*3.5; }
      this.guideTimer--;
      if(this.guideTimer <= 0){
        this.guided = false;
        this.baseX = this.x < W*0.5 ? W*0.5 : W*0.3;
        this.baseY = H*0.3 + Math.sin(Date.now()/3000)*H*0.15;
      }
    } else {
      var elapsed = (Date.now() - this.sceneStart) / 1000;
      var targetX = this.baseX + Math.sin(elapsed*0.35)*W*0.06;
      var targetY = this.baseY + Math.sin(elapsed*0.5)*H*0.08;
      this.vx += (targetX-this.x)*0.012;
      this.vy += (targetY-this.y)*0.012;
      var spd = Math.sqrt(this.vx*this.vx+this.vy*this.vy);
      if(spd > 2) { this.vx = this.vx/spd*2; this.vy = this.vy/spd*2; }
    }
    this.x += this.vx; this.y += this.vy;
    this.wingPhase += this.wingSpeed;

    // 拖尾星光
    if(Math.random() < 0.4){
      this.sparkles.push({
        x: this.x + (Math.random()-0.5)*40,
        y: this.y + (Math.random()-0.5)*25,
        r: 0.4+Math.random()*1.2,
        alpha: 0.65, decay: 0.018+Math.random()*0.025,
        vy: -(0.15+Math.random()*0.3)
      });
    }
    for(var s=this.sparkles.length-1; s>=0; s--){
      var sp = this.sparkles[s];
      sp.y += sp.vy; sp.alpha -= sp.decay; sp.r *= 0.994;
      if(sp.alpha <= 0) this.sparkles.splice(s,1);
    }
  },

  draw: function(){
    if(!this.visible) return;
    var x = this.x, y = this.y;
    var wp = this.wingPhase;

    // ---- 离屏Canvas缓存：每3帧重绘一次鸟身（4x高清），其余帧直接drawImage ----
    if(!this._ocache){ this._ocache = document.createElement('canvas'); this._ocache.width=800; this._ocache.height=640; this._ofc = this._ocache.getContext('2d'); this._oframe=0; }
    this._oframe++;
    if(this._oframe >= 3){
      this._oframe = 0;
      var oc = this._ofc;
      oc.clearRect(0,0,800,640);
      oc.save();
      oc.translate(400,320);
      // 4x高清绘制，缩放在主canvas的drawImage时处理
      oc.scale(4,4);

      var inkA = 0.75 + Math.sin(wp*0.7)*0.08;

      // 外层金紫光晕
      oc.save();
      oc.globalAlpha = inkA * 0.3;
      var halo = oc.createRadialGradient(-4,-6, 3, -4,-6, 60);
      halo.addColorStop(0, 'rgba(90,55,200,0.18)');
      halo.addColorStop(0.35, 'rgba(45,120,240,0.1)');
      halo.addColorStop(1, 'rgba(0,0,0,0)');
      oc.fillStyle = halo;
      oc.beginPath(); oc.arc(-4,-6, 60, 0, Math.PI*2); oc.fill();
      oc.restore();

      // 长尾绶带（五色渐变）
      oc.save();
      oc.globalAlpha = inkA * 0.7;
      oc.lineCap = 'round';
      for(var t=0; t<5; t++){
        var ti = t/4;
        var tsx = 10+t*2, tsy = -1+t*1.5;
        var tlen = 55 + Math.abs(t-2)*18;
        var tw = Math.sin(wp*1.8+t*0.9)*(4+ti*2.5);
        var tg = oc.createLinearGradient(tsx, tsy, tsx+tlen, tsy+tlen*0.3);
        tg.addColorStop(0,    'rgba(200,245,255,0.85)');
        tg.addColorStop(0.2,  'rgba(30,190,230,0.75)');
        tg.addColorStop(0.5,  'rgba(20,100,210,0.65)');
        tg.addColorStop(0.75, 'rgba(80,50,190,0.45)');
        tg.addColorStop(1,    'rgba(180,145,50,0.18)');
        oc.strokeStyle = tg;
        oc.lineWidth = 2.8 - ti*0.5;
        oc.shadowBlur = 6; oc.shadowColor = 'rgba(40,120,220,0.25)';
        oc.beginPath();
        oc.moveTo(tsx, tsy);
        oc.bezierCurveTo(tsx+tlen*0.35, tsy+tlen*0.08+tw, tsx+tlen*0.7, tsy+tlen*0.22+tw*0.5, tsx+tlen, tsy+tlen*0.3+tw*0.25);
        oc.stroke();
      }
      oc.restore();

      // 翅膀
      var wLift = Math.sin(wp)*22;
      oc.save();
      oc.globalAlpha = inkA * 0.82;
      oc.shadowBlur = 10; oc.shadowColor = 'rgba(25,90,210,0.3)';
      var wingG = oc.createRadialGradient(-6,-4, 3, -20,-22+wLift*0.5, 30);
      wingG.addColorStop(0,   'rgba(70,215,255,0.9)');
      wingG.addColorStop(0.3, 'rgba(30,150,240,0.82)');
      wingG.addColorStop(0.65,'rgba(20,80,195,0.65)');
      wingG.addColorStop(1,   'rgba(10,40,120,0.15)');
      oc.fillStyle = wingG;
      oc.beginPath();
      oc.moveTo(-2,-2);
      oc.quadraticCurveTo(-12,-26+wLift, -32,-28+wLift*0.65);
      oc.quadraticCurveTo(-20,-14+wLift*0.25, -2,2);
      oc.closePath();
      oc.fill();
      oc.restore();

      // 飞羽
      oc.save();
      oc.globalAlpha = inkA * 0.72;
      oc.lineCap = 'round';
      oc.shadowBlur = 0;
      for(var f=0; f<4; f++){
        var fa = -0.95 - f*0.09 + Math.sin(wp+f*0.15)*0.04;
        var fl = 30 - f*2.5 + Math.sin(wp*1.2+f*0.3)*1.5;
        var fx0 = -2+f*0.7, fy0 = -2+f*0.6;
        var ftx = fx0+Math.cos(fa)*fl;
        var fty = fy0+Math.sin(fa)*fl + wLift*(0.25+f*0.07);
        var fg2 = oc.createLinearGradient(fx0, fy0, ftx, fty);
        fg2.addColorStop(0,    'rgba(255,248,210,0.9)');
        fg2.addColorStop(0.4,  'rgba(210,175,55,0.75)');
        fg2.addColorStop(0.75, 'rgba(180,130,25,0.55)');
        fg2.addColorStop(1,    'rgba(120,80,10,0.25)');
        oc.strokeStyle = fg2;
        oc.lineWidth = 2.5 - f*0.3;
        oc.beginPath();
        oc.moveTo(fx0, fy0);
        oc.quadraticCurveTo(fx0+Math.cos(fa)*fl*0.4, fy0+Math.sin(fa)*fl*0.4+wLift*0.15, ftx, fty);
        oc.stroke();
      }
      oc.restore();

      // 身体
      oc.save();
      oc.globalAlpha = inkA * 0.9;
      oc.shadowBlur = 8; oc.shadowColor = 'rgba(20,80,200,0.25)';
      var bodyG = oc.createRadialGradient(-8,-2, 2, -8,-2, 18);
      bodyG.addColorStop(0,   'rgba(85,225,255,0.95)');
      bodyG.addColorStop(0.35,'rgba(45,155,245,0.88)');
      bodyG.addColorStop(0.7, 'rgba(25,90,200,0.72)');
      bodyG.addColorStop(1,   'rgba(12,45,110,0.2)');
      oc.fillStyle = bodyG;
      oc.beginPath();
      oc.moveTo(-10,-1);
      oc.bezierCurveTo(-4,-6, 8,-5, 14,0);
      oc.bezierCurveTo(12,5, 2,7, -5,6);
      oc.bezierCurveTo(-10,5, -13,2, -10,-1);
      oc.closePath();
      oc.fill();
      oc.restore();

      // 颈
      oc.save();
      oc.globalAlpha = inkA * 0.82;
      oc.shadowBlur = 4; oc.shadowColor = 'rgba(25,110,220,0.2)';
      var neckG = oc.createLinearGradient(-10,-2, -18,-14);
      neckG.addColorStop(0,   'rgba(75,220,255,0.92)');
      neckG.addColorStop(0.5, 'rgba(40,160,240,0.8)');
      neckG.addColorStop(1,   'rgba(18,80,185,0.55)');
      oc.fillStyle = neckG;
      oc.beginPath();
      oc.moveTo(-10,-1);
      oc.quadraticCurveTo(-14,-7, -17,-12);
      oc.quadraticCurveTo(-18,-15, -16,-16);
      oc.lineTo(-14,-14);
      oc.quadraticCurveTo(-14,-10, -10,-3);
      oc.closePath();
      oc.fill();
      oc.restore();

      // 头部
      oc.save();
      oc.globalAlpha = inkA * 0.92;
      oc.shadowBlur = 4; oc.shadowColor = 'rgba(20,80,200,0.2)';
      var headG = oc.createRadialGradient(-16,-15, 1, -16,-15, 5.5);
      headG.addColorStop(0,   'rgba(180,250,255,0.95)');
      headG.addColorStop(0.35,'rgba(60,190,255,0.85)');
      headG.addColorStop(0.7, 'rgba(25,100,210,0.7)');
      headG.addColorStop(1,   'rgba(10,50,120,0.3)');
      oc.fillStyle = headG;
      oc.beginPath(); oc.ellipse(-16,-15, 5, 4, 0.3, 0, Math.PI*2); oc.fill();
      oc.globalAlpha = inkA * 0.95;
      oc.shadowBlur = 0;
      oc.fillStyle = 'rgba(8,15,40,0.9)';
      oc.beginPath(); oc.arc(-14.5,-14.5, 1.1, 0, Math.PI*2); oc.fill();
      oc.globalAlpha = inkA * 0.85;
      oc.fillStyle = 'rgba(255,255,255,0.95)';
      oc.beginPath(); oc.arc(-14,-15, 0.45, 0, Math.PI*2); oc.fill();
      oc.restore();

      // 冠羽
      oc.save();
      oc.globalAlpha = inkA * 0.62;
      oc.lineCap = 'round';
      oc.shadowBlur = 0;
      for(var cr=0; cr<3; cr++){
        var cra = -0.55 + cr*0.2;
        var crl = 16 + cr*4 + Math.sin(wp+cr)*1.5;
        var crx = -16+cr*0.8, cry = -17;
        var crex = crx+Math.cos(cra)*crl + Math.sin(wp*1.5+cr)*2.5;
        var crey = cry+Math.sin(cra)*crl + Math.cos(wp*1.5+cr)*1.5;
        var crg = oc.createLinearGradient(crx, cry, crex, crey);
        crg.addColorStop(0,   'rgba(255,235,90,0.9)');
        crg.addColorStop(0.45,'rgba(220,175,40,0.7)');
        crg.addColorStop(1,   'rgba(160,120,15,0.25)');
        oc.strokeStyle = crg;
        oc.lineWidth = 1.8 - cr*0.15;
        oc.beginPath();
        oc.moveTo(crx, cry);
        oc.quadraticCurveTo(crx+Math.cos(cra)*crl*0.5, cry+Math.sin(cra)*crl*0.5-2.5, crex, crey);
        oc.stroke();
      }
      oc.restore();

      // 喙
      oc.save();
      oc.globalAlpha = inkA * 0.7;
      oc.shadowBlur = 0;
      var beakG = oc.createLinearGradient(-13,-14, -4,-13);
      beakG.addColorStop(0,   'rgba(130,95,20,0.9)');
      beakG.addColorStop(0.5, 'rgba(175,140,40,0.82)');
      beakG.addColorStop(1,   'rgba(200,165,60,0.65)');
      oc.strokeStyle = beakG;
      oc.lineWidth = 1.5;
      oc.lineCap = 'round';
      oc.beginPath();
      oc.moveTo(-13,-14);
      oc.quadraticCurveTo(-8,-14.5, -4,-13);
      oc.stroke();
      oc.restore();

      // 爪
      oc.save();
      oc.globalAlpha = inkA * 0.55;
      oc.lineCap = 'round';
      oc.shadowBlur = 0;
      oc.translate(5,5);
      oc.rotate(0.22 + Math.sin(wp*0.5)*0.06);
      oc.strokeStyle = 'rgba(175,140,35,0.9)';
      oc.lineWidth = 1.1;
      oc.beginPath(); oc.moveTo(0,0); oc.lineTo(1.2,5.5); oc.stroke();
      for(var cl=0; cl<3; cl++){
        var cla = -0.35+cl*0.35;
        oc.beginPath(); oc.moveTo(1.2,5.5);
        oc.lineTo(1.2+Math.cos(cla)*3.5, 5.5+Math.sin(cla)*2.8+1.5); oc.stroke();
      }
      oc.restore();

      oc.restore();
    }

    // ---- 主Canvas：drawImage离屏缓存（带缩放）+ 拖尾星光 ----
    bctx.save();
    var finalScale = this.scale * 1.3;
    var sw = 200 * finalScale, sh = 160 * finalScale;
    bctx.drawImage(this._ocache, x - sw/2, y - sh/2, sw, sh);

    // 拖尾星光
    bctx.globalCompositeOperation = 'screen';
    for(var i=0; i<this.sparkles.length; i++){
      var sp = this.sparkles[i];
      bctx.globalAlpha = sp.alpha * 0.85;
      bctx.beginPath(); bctx.arc(sp.x, sp.y, sp.r, 0, Math.PI*2);
      bctx.fillStyle = 'rgba(80,230,255,'+sp.alpha+')'; bctx.fill();
    }
    bctx.restore();
  },

  hitTest: function(px, py){
    if(!this.visible) return false;
    var s = this.scale, dx = px - this.x, dy = py - this.y;
    return Math.sqrt(dx*dx + dy*dy) < 50 * s;
  },

  guideTo: function(x, y){
    this.guided = true;
    this.guideX = x;
    this.guideY = y;
    this.guideTimer = 120;
  }
};

// ==============================================
// 六点六、仙鹤盘旋系统（s3/s4 昆仑墟）
// ==============================================
var craneScenes = ['s3', 's4'];

function Crane(id, cx, cy, rx, ry, speed, phase, scale){
  this.id = id;
  this.cx = cx; this.cy = cy;
  this.rx = rx; this.ry = ry;
  this.speed = speed;
  this.phase = phase;
  this.angle = phase;
  this.scale = scale;
  this.x = 0; this.y = 0;
  this.wingPhase = 0;
  this.wingSpeed = 0.06 + Math.random() * 0.03;
  this.active = false; this.visible = false;
  this.fleeing = false; this.fleeX = 0; this.fleeY = 0; this.fleeTimer = 0;
  this.fleeVx = 0; this.fleeVy = 0;
  // 飞行朝向（切线角）
  this.facing = 0;
  // 身体俯仰缓动值
  this.tiltAngle = 0;
  // 前一帧位置（用于切线计算）
  this.prevX = 0; this.prevY = 0;
}

Crane.prototype.reset = function(){
  this.angle = this.phase;
  this.wingPhase = 0;
  this.active = true; this.visible = true;
  this.fleeing = false; this.fleeTimer = 0;
  this.facing = 0; this.tiltAngle = 0;
  this.prevX = this.cx + Math.cos(this.phase) * this.rx;
  this.prevY = this.cy + Math.sin(this.phase) * this.ry;
  this.x = this.prevX; this.y = this.prevY;
};

Crane.prototype.deactivate = function(){
  this.active = false;
  this.fleeing = true;
  var ang = Math.random() * Math.PI * 2;
  this.fleeVx = Math.cos(ang) * 4;
  this.fleeVy = Math.sin(ang) * 2 - 2;
  this.fleeTimer = 200;
};

Crane.prototype.update = function(){
  if(!this.active){
    if(this.fleeing){ this.x += this.fleeVx; this.y += this.fleeVy; this.fleeTimer--; if(this.fleeTimer <= 0) this.visible = false; }
    return;
  }
  if(this.fleeing){
    this.x += this.fleeVx; this.y += this.fleeVy;
    this.fleeTimer--;
    if(this.fleeTimer <= 0){ this.fleeing = false; this.active = true; }
    this.wingPhase += this.wingSpeed * 1.6; // 惊飞时翅膀扑得更快
    // 惊飞时面朝逃跑方向
    var targetFacing = Math.atan2(this.fleeVy, this.fleeVx);
    this.facing += (targetFacing - this.facing) * 0.12;
    return;
  }
  // 记录上帧位置
  this.prevX = this.x; this.prevY = this.y;

  // 椭圆轨道
  this.angle += this.speed;
  if(this.angle > Math.PI*2) this.angle -= Math.PI*2;
  var cosA = Math.cos(this.angle);
  var sinA = Math.sin(this.angle);

  // 新位置
  var nx = this.cx + cosA * this.rx;
  // 高度 + 慢速气流起伏（多频叠加，看起来自然）
  var ny = this.cy
    + sinA * this.ry
    + Math.sin(this.angle * 1.7 + this.phase) * this.ry * 0.18
    + Math.sin(this.angle * 3.1 + this.phase * 0.5) * this.ry * 0.06;

  // 切线角（从上帧位置到新位置的方向）
  var dx = nx - this.prevX;
  var dy = ny - this.prevY;
  if(Math.abs(dx) > 0.001 || Math.abs(dy) > 0.001){
    var rawFacing = Math.atan2(dy, dx);
    // 缓动：让朝向平滑追赶切线
    var diff = rawFacing - this.facing;
    // 角度差归一化到 [-π, π]
    while(diff > Math.PI) diff -= Math.PI*2;
    while(diff < -Math.PI) diff += Math.PI*2;
    this.facing += diff * 0.08;
  }

  // 身体俯仰：cos(angle) 越大越靠近观察者 → 轻微仰角；在远端轻微低头
  var targetTilt = sinA * 0.18; // 盘旋时随高低微微俯仰
  this.tiltAngle += (targetTilt - this.tiltAngle) * 0.06;

  this.x = nx; this.y = ny;
  this.wingPhase += this.wingSpeed;

  // 手势感知偏移：手靠近时仙鹤轻轻让开，手远离后缓慢恢复
  if(isCraneActive() && (window._handProximity||0) > 0.08){
    var hx = W * (window._handCenterNX || 0.5);
    var hy = H * (window._handCenterNY || 0.5);
    var ddx = this.x - hx;
    var ddy = this.y - hy;
    var dist = Math.sqrt(ddx*ddx + ddy*ddy);
    if(dist < 200 * this.scale && dist > 1){
      // 手离仙鹤越近，偏移越大（最大偏移轨道半径的30%）
      var pushStr = (1 - dist/(200*this.scale)) * 0.3;
      this.cx += ddx/dist * this.rx * pushStr * 0.008;
      this.cy += ddy/dist * this.ry * pushStr * 0.008;
      // 稍微加快翅膀（受惊感）
      this.wingSpeed = 0.08 + Math.random()*0.02;
    }
  } else {
    // 无手势时缓慢恢复原始轨道中心
    var origCx = W * (this.id === 0 ? 0.35 : this.id === 1 ? 0.55 : 0.45);
    var origCy = H * (this.id === 0 ? 0.18 : this.id === 1 ? 0.22 : 0.15);
    this.cx += (origCx - this.cx) * 0.005;
    this.cy += (origCy - this.cy) * 0.005;
    this.wingSpeed = 0.06 + this.id * 0.008;
  }
};

Crane.prototype.hitTest = function(px, py){
  if(!this.visible) return false;
  var s = this.scale, dx = px - this.x, dy = py - this.y;
  return Math.sqrt(dx*dx + dy*dy) < 55 * s;
};

Crane.prototype.scare = function(px, py){
  this.fleeing = true;
  this.fleeTimer = 120;
  var ang = Math.atan2(this.y - py, this.x - px);
  this.fleeVx = Math.cos(ang) * 5;
  this.fleeVy = Math.sin(ang) * 3 - 1.5;
};

Crane.prototype.draw = function(){
  if(!this.visible) return;
  var wp = this.wingPhase;
  var wpU = Math.sin(wp);
  var s = this.scale;

  // ---- 离屏Canvas缓存：每4帧重绘一次鹤身 ----
  if(!this._ocache){ this._ocache = document.createElement('canvas'); this._ocache.width=240; this._ocache.height=200; this._ofc = this._ocache.getContext('2d'); this._oframe=0; }
  this._oframe++;
  if(this._oframe >= 4){
    this._oframe = 0;
    var oc = this._ofc;
    oc.clearRect(0,0,240,200);
    oc.save();
    oc.translate(120,100);
    if(Math.cos(this.facing) > 0) oc.scale(-s, s);
    else oc.scale(s, s);
    oc.rotate(this.tiltAngle);

    var inkAlpha = 0.88 + wpU * 0.08;

    // 远翅
    var farWingLift = wpU * 18;
    oc.save();
    oc.globalAlpha = inkAlpha * 0.75;
    oc.shadowBlur = 6; oc.shadowColor = 'rgba(180,195,220,0.3)';
    var farWingG = oc.createRadialGradient(-6,-8, 2, -14,-18+farWingLift*0.4, 20);
    farWingG.addColorStop(0,   'rgba(255,255,252,0.95)');
    farWingG.addColorStop(0.45,'rgba(245,248,252,0.82)');
    farWingG.addColorStop(0.75,'rgba(60,65,80,0.7)');
    farWingG.addColorStop(1,   'rgba(10,12,18,0.3)');
    oc.fillStyle = farWingG;
    oc.beginPath();
    oc.moveTo(-2,-2);
    oc.bezierCurveTo(-8,-16+farWingLift*0.5, -16,-22+farWingLift*0.35, -22,-20+farWingLift*0.2);
    oc.bezierCurveTo(-14,-10+farWingLift*0.15, -6,-4, -2,-2);
    oc.closePath();
    oc.fill();
    oc.restore();

    // 尾羽
    oc.save();
    oc.globalAlpha = inkAlpha * 0.85;
    oc.lineCap = 'round';
    oc.shadowBlur = 0;
    for(var t=0; t<3; t++){
      var toff = (t-1)*1.5;
      var tlen = 30 + t*7;
      var tw = wpU*(2+t*0.8);
      var tg = oc.createLinearGradient(16,toff*0.6, 38+toff,toff*2.5+tw*0.3);
      tg.addColorStop(0,   'rgba(255,255,255,0.95)');
      tg.addColorStop(0.5, 'rgba(235,238,245,0.82)');
      tg.addColorStop(0.8, 'rgba(50,55,65,0.75)');
      tg.addColorStop(1,   'rgba(10,12,16,0.4)');
      oc.strokeStyle = tg;
      oc.lineWidth = 2.8 - t*0.4;
      oc.beginPath();
      oc.moveTo(16, toff*0.6);
      oc.bezierCurveTo(22+toff, toff+tw, 30+toff*1.5, toff*2+tw*0.6, 38+toff, toff*2.5+tw*0.3);
      oc.stroke();
    }
    oc.restore();

    // 身体
    oc.save();
    oc.globalAlpha = inkAlpha * 0.96;
    oc.shadowBlur = 6; oc.shadowColor = 'rgba(190,200,218,0.3)';
    var bodyG = oc.createRadialGradient(2,-2, 2, 2,-2, 20);
    bodyG.addColorStop(0,   'rgba(255,255,255,0.98)');
    bodyG.addColorStop(0.35,'rgba(252,253,255,0.94)');
    bodyG.addColorStop(0.7, 'rgba(235,240,248,0.8)');
    bodyG.addColorStop(1,   'rgba(180,190,210,0.25)');
    oc.fillStyle = bodyG;
    oc.beginPath();
    oc.moveTo(16, 0);
    oc.bezierCurveTo(10,-5, -4,-6, -10,-3);
    oc.bezierCurveTo(-14,-1, -14,3, -10,5);
    oc.bezierCurveTo(-4,7, 10,5, 16,0);
    oc.closePath();
    oc.fill();
    oc.restore();

    // 颈
    oc.save();
    oc.globalAlpha = inkAlpha * 0.9;
    oc.shadowBlur = 0;
    var neckG = oc.createLinearGradient(-8,-1, -18,-14);
    neckG.addColorStop(0,   'rgba(255,255,255,0.97)');
    neckG.addColorStop(0.4, 'rgba(242,245,250,0.88)');
    neckG.addColorStop(1,   'rgba(120,128,148,0.7)');
    oc.fillStyle = neckG;
    oc.beginPath();
    oc.moveTo(-8,-1);
    oc.quadraticCurveTo(-12,-6, -15,-10);
    oc.quadraticCurveTo(-17,-13, -15,-14);
    oc.lineTo(-13,-12);
    oc.quadraticCurveTo(-10,-8, -8,-3);
    oc.closePath();
    oc.fill();
    oc.restore();

    // 头部
    oc.save();
    oc.globalAlpha = inkAlpha * 0.97;
    oc.shadowBlur = 2; oc.shadowColor = 'rgba(0,0,0,0.3)';
    var headG = oc.createRadialGradient(-16,-13, 1, -16,-13, 4.5);
    headG.addColorStop(0,   'rgba(30,32,45,0.98)');
    headG.addColorStop(0.6, 'rgba(18,20,30,0.92)');
    headG.addColorStop(1,   'rgba(5,5,10,0.5)');
    oc.fillStyle = headG;
    oc.beginPath(); oc.ellipse(-16,-13, 3.8, 3, -0.2, 0, Math.PI*2); oc.fill();
    oc.globalAlpha = inkAlpha * 0.97;
    oc.fillStyle = 'rgba(0,0,5,0.97)';
    oc.beginPath(); oc.arc(-15,-12.5, 0.9, 0, Math.PI*2); oc.fill();
    oc.globalAlpha = inkAlpha * 0.95;
    oc.fillStyle = 'rgba(255,255,255,0.97)';
    oc.beginPath(); oc.arc(-14.7,-12.8, 0.35, 0, Math.PI*2); oc.fill();
    oc.restore();

    // 丹顶 — 更鲜艳的朱红
    oc.save();
    oc.globalAlpha = inkAlpha * 0.95;
    oc.shadowBlur = 8; oc.shadowColor = 'rgba(230,40,30,0.5)';
    var dandingG = oc.createRadialGradient(-17,-15, 0.3, -17,-15, 3.2);
    dandingG.addColorStop(0,   'rgba(255,60,40,1)');
    dandingG.addColorStop(0.4, 'rgba(240,30,20,0.95)');
    dandingG.addColorStop(0.75,'rgba(200,20,12,0.8)');
    dandingG.addColorStop(1,   'rgba(150,10,5,0.3)');
    oc.fillStyle = dandingG;
    oc.beginPath(); oc.ellipse(-17,-15, 3.2, 2.2, -0.15, 0, Math.PI*2); oc.fill();
    oc.globalAlpha = inkAlpha * 0.65;
    oc.fillStyle = 'rgba(255,180,160,0.8)';
    oc.beginPath(); oc.ellipse(-17.3,-15.4, 1.0, 0.7, -0.2, 0, Math.PI*2); oc.fill();
    oc.restore();

    // 喙 — 更鲜亮的青黄
    oc.save();
    oc.globalAlpha = inkAlpha * 0.88;
    oc.shadowBlur = 0;
    var beakG = oc.createLinearGradient(-14,-12, -28,-11);
    beakG.addColorStop(0,   'rgba(180,190,90,0.95)');
    beakG.addColorStop(0.5, 'rgba(150,165,70,0.9)');
    beakG.addColorStop(1,   'rgba(110,125,50,0.75)');
    oc.strokeStyle = beakG;
    oc.lineWidth = 1.8;
    oc.lineCap = 'round';
    oc.beginPath();
    oc.moveTo(-14,-12);
    oc.quadraticCurveTo(-22,-12.5, -28,-11);
    oc.stroke();
    oc.restore();

    // 近翅
    var nearWingLift = wpU * 26;
    oc.save();
    oc.globalAlpha = inkAlpha * 0.95;
    oc.shadowBlur = 8; oc.shadowColor = 'rgba(180,195,220,0.3)';
    var coverG = oc.createRadialGradient(-6,-6, 2, -6,-6, 24);
    coverG.addColorStop(0,   'rgba(255,255,255,0.97)');
    coverG.addColorStop(0.4, 'rgba(248,250,255,0.85)');
    coverG.addColorStop(0.75,'rgba(225,232,242,0.6)');
    coverG.addColorStop(1,   'rgba(30,35,48,0.2)');
    oc.fillStyle = coverG;
    oc.beginPath();
    oc.moveTo(-2,-2);
    oc.bezierCurveTo(-10,-18+nearWingLift*0.5, -20,-24+nearWingLift*0.35, -26,-22+nearWingLift*0.2);
    oc.bezierCurveTo(-18,-12+nearWingLift*0.15, -8,-5, -2,-2);
    oc.closePath();
    oc.fill();
    oc.restore();

    // 飞羽 — 更浓烈的墨黑
    oc.save();
    oc.globalAlpha = inkAlpha * 0.88;
    oc.lineCap = 'round';
    oc.shadowBlur = 0;
    for(var f=0; f<4; f++){
      var fAng = -1.0 - f*0.1;
      var fLen = 30 - f*3.5 + wpU*1.2;
      var fx0 = -3+f*0.6, fy0 = -3+f*0.5;
      var ftx = fx0+Math.cos(fAng)*fLen;
      var fty = fy0+Math.sin(fAng)*fLen + wpU*(1.2+f*0.25);
      var fg2 = oc.createLinearGradient(fx0, fy0, ftx, fty);
      fg2.addColorStop(0,    'rgba(255,255,255,0.95)');
      fg2.addColorStop(0.3,  'rgba(240,245,252,0.82)');
      fg2.addColorStop(0.55, 'rgba(180,188,205,0.65)');
      fg2.addColorStop(0.75, 'rgba(40,45,55,0.85)');
      fg2.addColorStop(1,    'rgba(5,5,10,0.97)');
      oc.strokeStyle = fg2;
      oc.lineWidth = 2.8 - f*0.35;
      oc.beginPath();
      oc.moveTo(fx0, fy0);
      oc.quadraticCurveTo(fx0+Math.cos(fAng)*fLen*0.35, fy0+Math.sin(fAng)*fLen*0.35, ftx, fty);
      oc.stroke();
    }
    oc.restore();

    // 腿 — 更深更清晰
    oc.save();
    oc.globalAlpha = inkAlpha * 0.7;
    oc.shadowBlur = 0;
    oc.strokeStyle = 'rgba(80,72,55,0.8)';
    oc.lineWidth = 1.4;
    oc.lineCap = 'round';
    var legW = wpU*2.5;
    oc.beginPath(); oc.moveTo(3,4); oc.bezierCurveTo(10,6, 20,7+legW, 30,5+legW); oc.stroke();
    oc.globalAlpha = inkAlpha * 0.5;
    oc.lineWidth = 1.0;
    oc.beginPath(); oc.moveTo(1,3); oc.bezierCurveTo(8,4.5, 16,5.5+legW*0.7, 24,3.5+legW*0.6); oc.stroke();
    oc.restore();

    oc.restore();
  }

  // ---- 主Canvas：drawImage离屏缓存 ----
  var x = this.x, y = this.y;
  bctx.save();
  bctx.drawImage(this._ocache, x - 120, y - 100);
  bctx.restore();
};


// ===== 创建3只鹤 =====
var cranes = [
  new Crane(0, W*0.35, H*0.18, W*0.28, H*0.06, 0.004, 0, 1.4),
  new Crane(1, W*0.55, H*0.22, W*0.32, H*0.08, 0.0055, Math.PI*0.7, 1.65),
  new Crane(2, W*0.45, H*0.15, W*0.35, H*0.07, 0.0035, Math.PI*1.4, 1.15)
];

function isCraneActive(){
  return craneScenes.indexOf(currentSceneId) >= 0;
}


// ---- 触摸/点击交互绑定（不死树/瑶池场景） ----
function treeFlash(x, y){
  // 树场景点击时的金色闪光反馈，确保不可忽略
  var fl = document.createElement('div');
