// ==============================================
// 西王母光轮粒子系统 (s5/s6)
// ==============================================
var queenScenes = ['s5', 's6'];
function isQueenActive(){
  return queenScenes.indexOf(currentSceneId) >= 0;
}

var queenParticles = [];
var queenAuras = [];
var queenSpawnTimer = 0;

// 光轮粒子 —— 金银双色光点，从画面中下部升起
function QueenParticle(ox, oy){
  var ang = Math.random() * Math.PI * 2;
  var spd = 0.3 + Math.random() * 1.8;
  this.x = ox + (Math.random() - 0.5) * W * 0.4;
  this.y = oy + (Math.random() - 0.5) * H * 0.12;
  this.vx = Math.cos(ang) * spd * 0.3;
  this.vy = -(0.4 + Math.random() * 1.2);
  this.r = 0.8 + Math.random() * 2.5;
  this.alpha = 0.15 + Math.random() * 0.5;
  this.life = 1.0;
  this.decay = 0.004 + Math.random() * 0.01;
  this.sway = (Math.random() - 0.5) * 0.03;
  this.swayPhase = Math.random() * Math.PI * 2;
  // 金银配色：sun gold / moon silver
  var t = Math.random();
  if(t < 0.55) this.color = 'rgba(240,190,100,';   // 暖金
  else if(t < 0.85) this.color = 'rgba(255,245,210,'; // 亮白
  else this.color = 'rgba(200,220,255,';             // 月银微蓝
  this.age = 0;
}
QueenParticle.prototype.update = function(){
  this.age++;
  this.x += this.vx + Math.sin(this.swayPhase + this.age * 0.05) * this.sway;
  this.y += this.vy;
  this.vy *= 0.998;
  this.life -= this.decay;
  this.r *= 0.997;
  this.alpha = this.life * (0.4 + Math.sin(this.age * 0.03) * 0.2);
  return this.life > 0;
};
QueenParticle.prototype.draw = function(){
  qctx.save();
  qctx.globalAlpha = Math.max(0, this.alpha);
  // 外晕
  var grd = qctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 4);
  grd.addColorStop(0, this.color + '0.7)');
  grd.addColorStop(0.4, this.color + '0.25)');
  grd.addColorStop(1, this.color + '0)');
  qctx.fillStyle = grd;
  qctx.beginPath(); qctx.arc(this.x, this.y, this.r * 4, 0, Math.PI * 2); qctx.fill();
  // 核心亮点
  qctx.globalAlpha = Math.max(0, this.alpha * 1.4);
  qctx.fillStyle = this.color + '0.9)';
  qctx.beginPath(); qctx.arc(this.x, this.y, this.r * 0.6, 0, Math.PI * 2); qctx.fill();
  qctx.restore();
};

// 光轮脉冲 —— 画面中央扩散光环
function QueenAura(){
  this.x = W * 0.5;
  this.y = H * 0.42;
  this.r = 0;
  this.maxR = W * 0.35;
  this.alpha = 0.35;
  this.life = 1.0;
  this.decay = 0.012 + Math.random() * 0.006;
  this.ringCount = 2 + Math.floor(Math.random() * 2);
}
QueenAura.prototype.update = function(){
  this.r += (this.maxR - this.r) * 0.03;
  this.life -= this.decay;
  this.alpha = this.life * 0.3;
  return this.life > 0;
};
QueenAura.prototype.draw = function(){
  qctx.save();
  qctx.globalAlpha = Math.max(0, this.alpha);
  // 多层光环
  for(var ri = 0; ri < this.ringCount; ri++){
    var rr = this.r * (0.5 + ri * 0.5);
    var grd = qctx.createRadialGradient(this.x, this.y, rr * 0.6, this.x, this.y, rr);
    grd.addColorStop(0, 'rgba(255,245,210,0)');
    grd.addColorStop(0.5, 'rgba(240,190,100,0.25)');
    grd.addColorStop(0.8, 'rgba(200,220,255,0.15)');
    grd.addColorStop(1, 'rgba(255,245,210,0)');
    qctx.fillStyle = grd;
    qctx.beginPath(); qctx.arc(this.x, this.y, rr, 0, Math.PI * 2); qctx.fill();
  }
  qctx.restore();
};

// 光柱 —— 从顶部垂下的神圣光束
function QueenBeam(bx, angleW){
  this.x = bx;
  this.y = 0;
  this.angle = angleW || 0;
  this.alpha = 0.06 + Math.random() * 0.08;
  this.life = 1.0;
  this.decay = 0.003 + Math.random() * 0.004;
  this.width = 40 + Math.random() * 100;
  this.len = H * (0.5 + Math.random() * 0.4);
}
QueenBeam.prototype.update = function(){
  this.life -= this.decay;
  this.alpha = this.life * 0.08;
  return this.life > 0;
};
QueenBeam.prototype.draw = function(){
  qctx.save();
  qctx.globalAlpha = Math.max(0, this.alpha);
  var grd = qctx.createLinearGradient(this.x, this.y, this.x + Math.cos(this.angle) * 60, this.y + this.len);
  grd.addColorStop(0, 'rgba(255,245,210,0.3)');
  grd.addColorStop(0.5, 'rgba(240,190,100,0.1)');
  grd.addColorStop(1, 'rgba(255,245,210,0)');
  qctx.fillStyle = grd;
  qctx.beginPath();
  qctx.moveTo(this.x - this.width * 0.2, this.y);
  qctx.lineTo(this.x + this.width * 0.2, this.y);
  qctx.lineTo(this.x + this.width * 0.6 + Math.cos(this.angle) * 40, this.y + this.len);
  qctx.lineTo(this.x - this.width * 0.6 + Math.cos(this.angle) * 40, this.y + this.len);
  qctx.closePath();
  qctx.fill();
  qctx.restore();
};

var queenBeams = [];
var queenBeamTimer = 0;

function spawnQueenBeams(){
  queenBeams = [];
  var beamCount = 3 + Math.floor(Math.random() * 4);
  for(var b = 0; b < beamCount; b++){
    queenBeams.push(new QueenBeam(
      W * (0.15 + Math.random() * 0.7),
      (Math.random() - 0.5) * 0.3
    ));
  }
}

function updateQueenCanvas(){
  if(!isQueenActive() && queenParticles.length === 0 && queenAuras.length === 0 && queenBeams.length === 0){
    qctx.clearRect(0, 0, W, H);
    return;
  }

  qctx.clearRect(0, 0, W, H);

  // 场景激活时持续生成粒子
  if(isQueenActive()){
    queenSpawnTimer++;
    // 每2-4帧生成一个粒子
    if(queenSpawnTimer >= (2 + Math.floor(Math.random() * 3))){
      queenSpawnTimer = 0;
      queenParticles.push(new QueenParticle(W * 0.5, H * 0.55));
      // 偶尔多生成几个
      if(Math.random() < 0.35){
        queenParticles.push(new QueenParticle(W * 0.5, H * 0.55));
      }
    }
    // 每隔一段时间生成光环
    if(Math.random() < 0.008){
      queenAuras.push(new QueenAura());
    }
    // 光束定时刷新
    queenBeamTimer++;
    if(queenBeamTimer > 180){
      queenBeamTimer = 0;
      spawnQueenBeams();
    }
  }

  // 绘制光束
  for(var bi = queenBeams.length - 1; bi >= 0; bi--){
    if(!queenBeams[bi].update()) queenBeams.splice(bi, 1);
    else queenBeams[bi].draw();
  }

  // 绘制光环
  for(var ai = queenAuras.length - 1; ai >= 0; ai--){
    if(!queenAuras[ai].update()) queenAuras.splice(ai, 1);
    else queenAuras[ai].draw();
  }

  // 绘制粒子
  for(var qi = queenParticles.length - 1; qi >= 0; qi--){
    if(!queenParticles[qi].update()) queenParticles.splice(qi, 1);
    else queenParticles[qi].draw();
  }
}

// ==============================================
// 瑶池水面星河系统 (s9/s10)
// ==============================================
var poolScenes = ['s9', 's10'];
function isPoolActive(){
  return poolScenes.indexOf(currentSceneId) >= 0;
}

var poolRipples = [];
var poolStars = [];
var poolChars = [];
var poolSpawnTimer = 0;
var poolWavePhase = 0;

// 水面涟漪 —— 从随机位置扩散的同心圆
function PoolRipple(x, y, big){
  this.x = x; this.y = y;
  this.r = big ? (8 + Math.random() * 20) : (3 + Math.random() * 10);
  this.maxR = big ? (W * 0.4 + Math.random() * W * 0.3) : (W * 0.12 + Math.random() * W * 0.18);
  this.alpha = big ? 0.18 : 0.12;
  this.life = 1.0;
  this.decay = big ? 0.006 : 0.012;
  this.lineW = big ? 1.2 : 0.6;
}
PoolRipple.prototype.update = function(){
  this.r += (this.maxR - this.r) * 0.015;
  this.life -= this.decay;
  this.alpha = this.life * (0.12 + Math.sin(this.life * 4) * 0.04);
  this.lineW = this.life * (0.4 + Math.sin(this.life * 3) * 0.3);
  return this.life > 0;
};
PoolRipple.prototype.draw = function(){
  pctx2.save();
  pctx2.globalAlpha = Math.max(0, this.alpha);
  pctx2.strokeStyle = 'rgba(140,200,220,' + Math.max(0, this.alpha * 2.5) + ')';
  pctx2.lineWidth = this.lineW;
  pctx2.beginPath(); pctx2.arc(this.x, this.y, this.r, 0, Math.PI * 2); pctx2.stroke();
  // 内圈淡晕
  var grd = pctx2.createRadialGradient(this.x, this.y, this.r * 0.6, this.x, this.y, this.r);
  grd.addColorStop(0, 'rgba(120,180,210,0)');
  grd.addColorStop(0.7, 'rgba(100,170,200,' + Math.max(0, this.alpha * 0.6) + ')');
  grd.addColorStop(1, 'rgba(80,150,190,0)');
  pctx2.fillStyle = grd;
  pctx2.beginPath(); pctx2.arc(this.x, this.y, this.r, 0, Math.PI * 2); pctx2.fill();
  pctx2.restore();
};

// 星河倒映粒子 —— 蓝白银色微光点，像水面倒映的星星
function PoolStar(x, y){
  this.x = x; this.y = y;
  this.ox = x; this.oy = y;
  this.r = 0.3 + Math.random() * 1.6;
  this.alpha = 0.15 + Math.random() * 0.55;
  this.life = 1.0;
  this.decay = 0.003 + Math.random() * 0.008;
  this.freq = 0.01 + Math.random() * 0.03;
  this.amp = 0.3 + Math.random() * 1.5;
  this.phase = Math.random() * Math.PI * 2;
  this.twinkleSpeed = 0.03 + Math.random() * 0.06;
  this.twinklePhase = Math.random() * Math.PI * 2;
  // 配色：蓝银白 / 青蓝
  var t = Math.random();
  if(t < 0.4) this.color = 'rgba(180,220,255,';    // 浅蓝
  else if(t < 0.75) this.color = 'rgba(220,235,255,'; // 银白
  else this.color = 'rgba(120,200,230,';             // 青蓝
  this.age = 0;
}
PoolStar.prototype.update = function(){
  this.age++;
  this.x = this.ox + Math.sin(this.age * this.freq + this.phase) * this.amp * 0.3;
  this.y = this.oy + Math.cos(this.age * this.freq * 1.3 + this.phase) * this.amp * 0.4;
  this.life -= this.decay;
  this.alpha = this.life * (0.2 + Math.sin(this.age * this.twinkleSpeed + this.twinklePhase) * 0.3);
  return this.life > 0;
};
PoolStar.prototype.draw = function(){
  pctx2.save();
  pctx2.globalAlpha = Math.max(0, this.alpha);
  // 十字星芒
  var cx = this.x, cy = this.y, r = this.r;
  var grd = pctx2.createRadialGradient(cx, cy, 0, cx, cy, r * 3);
  grd.addColorStop(0, this.color + '0.8)');
  grd.addColorStop(0.5, this.color + '0.2)');
  grd.addColorStop(1, this.color + '0)');
  pctx2.fillStyle = grd;
  pctx2.beginPath(); pctx2.arc(cx, cy, r * 3, 0, Math.PI * 2); pctx2.fill();
  // 核心
  pctx2.globalAlpha = Math.max(0, this.alpha * 1.3);
  pctx2.fillStyle = this.color + '0.9)';
  pctx2.beginPath(); pctx2.arc(cx, cy, r * 0.5, 0, Math.PI * 2); pctx2.fill();
  pctx2.restore();
};

// 浮字 —— 水面浮现的汉字，缓慢上升后消失
var poolWordBank = ['瑶','池','星','河','墨','文','字','诗','水','月','镜','影','光','永','恒','生','死','风','云','山'];
function PoolChar(x, y){
  this.x = x; this.y = y;
  this.vy = -(0.15 + Math.random() * 0.35);
  this.vx = (Math.random() - 0.5) * 0.25;
  this.alpha = 0;
  this.fadeIn = true;
  this.fadeProgress = 0;
  this.maxAlpha = 0.25 + Math.random() * 0.35;
  this.life = 1.0;
  this.decay = 0.003 + Math.random() * 0.005;
  this.char = poolWordBank[Math.floor(Math.random() * poolWordBank.length)];
  this.fontSize = 14 + Math.floor(Math.random() * 22);
}
PoolChar.prototype.update = function(){
  if(this.fadeIn){
    this.fadeProgress += 0.02;
    this.alpha = Math.min(this.maxAlpha, this.fadeProgress * this.maxAlpha);
    if(this.fadeProgress >= 1) this.fadeIn = false;
  }
  this.x += this.vx;
  this.y += this.vy;
  this.life -= this.decay;
  if(!this.fadeIn) this.alpha = this.life * this.maxAlpha;
  return this.life > 0;
};
PoolChar.prototype.draw = function(){
  pctx2.save();
  pctx2.globalAlpha = Math.max(0, this.alpha);
  pctx2.fillStyle = 'rgba(160,210,230,1)';
  pctx2.font = this.fontSize + 'px "Noto Serif SC","STSong","SimSun",serif';
  pctx2.textAlign = 'center';
  pctx2.textBaseline = 'middle';
  // 外发光
  pctx2.shadowColor = 'rgba(120,200,240,0.5)';
  pctx2.shadowBlur = 6;
  pctx2.fillText(this.char, this.x, this.y);
  pctx2.restore();
};

function poolBurst(ox, oy, big){
  var ripples = big ? 5 : 2;
  for(var i = 0; i < ripples; i++){
    poolRipples.push(new PoolRipple(ox + (Math.random() - 0.5) * 60, oy + (Math.random() - 0.5) * 40, big));
  }
  var stars = big ? 35 : 12;
  for(var si = 0; si < stars; si++){
    poolStars.push(new PoolStar(
      ox + (Math.random() - 0.5) * W * (big ? 0.6 : 0.3),
      oy + (Math.random() - 0.5) * H * (big ? 0.5 : 0.25)
    ));
  }
  var chars = big ? 8 : 2;
  for(var ci = 0; ci < chars; ci++){
    poolChars.push(new PoolChar(
      ox + (Math.random() - 0.5) * W * 0.5,
      oy + (Math.random() - 0.5) * H * 0.3
    ));
  }
  if(big){
    PC2.style.transition = 'filter 0s';
    PC2.style.filter = 'brightness(1.5) hue-rotate(15deg)';
    setTimeout(function(){ PC2.style.transition = 'filter 0.8s'; PC2.style.filter = 'brightness(1) hue-rotate(0deg)'; }, 100);
  }
}

function poolBloomFull(){
  var cx = W * 0.5, cy = H * 0.55;
  poolBurst(cx, cy, true);
  // 从多个位置同时爆发
  poolBurst(cx * 0.25, cy * 0.8, false);
  poolBurst(cx * 1.75, cy * 0.8, false);
  poolBurst(cx * 0.5, cy * 1.3, false);
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);z-index:22;pointer-events:none;color:rgba(180,220,240,0.9);font-size:clamp(16px,4vw,28px);font-weight:900;letter-spacing:10px;text-shadow:0 0 30px rgba(140,200,230,0.8),0 0 60px rgba(100,180,220,0.5);animation:treeBloomWord 2.2s ease-out both';
  d.textContent = '碧波万顷 · 星河倒映';
  document.body.appendChild(d);
  setTimeout(function(){ try{document.body.removeChild(d);}catch(e){} }, 2400);
}

function updatePoolCanvas(){
  if(!isPoolActive() && poolRipples.length === 0 && poolStars.length === 0 && poolChars.length === 0){
    pctx2.clearRect(0, 0, W, H);
    return;
  }
  pctx2.clearRect(0, 0, W, H);

  if(isPoolActive()){
    poolSpawnTimer++;
    poolWavePhase += 0.008;

    // 涟漪：偶尔自然生成
    if(poolSpawnTimer % 40 === 0 && Math.random() < 0.5){
      poolRipples.push(new PoolRipple(
        W * (0.2 + Math.random() * 0.6),
        H * (0.3 + Math.random() * 0.4),
        Math.random() < 0.3
      ));
    }
    // 星点：持续生成
    if(poolSpawnTimer % 3 === 0){
      poolStars.push(new PoolStar(
        W * (0.05 + Math.random() * 0.9),
        H * (0.15 + Math.random() * 0.7)
      ));
    }
    // 浮字：偶尔浮现
    if(poolSpawnTimer > 120 && poolSpawnTimer % 55 === 0){
      poolChars.push(new PoolChar(
        W * (0.15 + Math.random() * 0.7),
        H * (0.4 + Math.random() * 0.35)
      ));
    }

    // 底部水平微弱水波光纹
    pctx2.save();
    pctx2.globalAlpha = 0.04;
    for(var wx = 0; wx < W; wx += 80){
      var wy = H * 0.65 + Math.sin(wx * 0.008 + poolWavePhase) * 18;
      var grd = pctx2.createLinearGradient(wx, wy - 15, wx, wy + 15);
      grd.addColorStop(0, 'rgba(140,200,230,0)');
      grd.addColorStop(0.5, 'rgba(160,220,245,0.3)');
      grd.addColorStop(1, 'rgba(120,190,220,0)');
      pctx2.fillStyle = grd;
      pctx2.fillRect(wx - 20, wy - 15, 120, 30);
    }
    pctx2.restore();
  }

  // 限制池子大小
  if(poolStars.length > 80) poolStars.splice(0, poolStars.length - 80);
  if(poolRipples.length > 12) poolRipples.splice(0, poolRipples.length - 12);
  if(poolChars.length > 18) poolChars.splice(0, poolChars.length - 18);

  // 绘制涟漪
  for(var ri = poolRipples.length - 1; ri >= 0; ri--){
    if(!poolRipples[ri].update()) poolRipples.splice(ri, 1);
    else poolRipples[ri].draw();
  }
  // 绘制星点
  for(var si = poolStars.length - 1; si >= 0; si--){
    if(!poolStars[si].update()) poolStars.splice(si, 1);
    else poolStars[si].draw();
  }
  // 绘制浮字
  for(var ci = poolChars.length - 1; ci >= 0; ci--){
    if(!poolChars[ci].update()) poolChars.splice(ci, 1);
    else poolChars[ci].draw();
  }
}


function loop(){
  requestAnimationFrame(loop);

  // 雨 canvas
  rctx.clearRect(0,0,W,H);
  for(var i=0;i<Drops.length;i++){ Drops[i].update(); Drops[i].draw(); }
  for(var j=Ripples.length-1;j>=0;j--){ if(!Ripples[j].update()) Ripples.splice(j,1); else Ripples[j].draw(); }
  for(var wi=0;wi<WindowDrops.length;wi++){ WindowDrops[wi].update(); WindowDrops[wi].draw(); }

  // 窗雾恢复（雾会慢慢重新凝结）
  if(isFogActive() && fogCleared){
    regenFog();
  }

  // 墨 canvas
  ictx.clearRect(0,0,W,H);
  for(var k=inkStrokes.length-1;k>=0;k--){ if(!inkStrokes[k].update()) inkStrokes.splice(k,1); else inkStrokes[k].draw(); }
  if(currentStroke) currentStroke.draw();
  for(var m=inkCircles.length-1;m>=0;m--){ if(!inkCircles[m].update()) inkCircles.splice(m,1); else inkCircles[m].draw(); }
  for(var n=inkDrips.length-1;n>=0;n--){ if(!inkDrips[n].update()) inkDrips.splice(n,1); else inkDrips[n].draw(); }

  // 粒子 canvas
  pctx.clearRect(0,0,W,H);
  if(Math.random()<0.003) pts.push(new P(Math.random()*W,H+10,Math.random()<0.25?'rgba(82,183,136,':'rgba(100,200,230,'));
  for(var p=pts.length-1;p>=0;p--){ if(!pts[p].up()) pts.splice(p,1); else pts[p].dr(); }

  // 神鸟 canvas
  bctx.clearRect(0,0,W,H);
  updateBirdSparkles();
  if(bird.active || bird.visible){ bird.update(); bird.draw(); }

  // 仙鹤
  if(isCraneActive()){
    for(var cr=0; cr<cranes.length; cr++){
      cranes[cr].update(); cranes[cr].draw();
    }
  } else {
    // 非鹤场景，让仍在画面中的鹤飞走
    for(var cr2=0; cr2<cranes.length; cr2++){
      if(cranes[cr2].visible){
        if(cranes[cr2].active) cranes[cr2].deactivate();
        cranes[cr2].update(); cranes[cr2].draw();
      }
    }
  }

  // 神树光芒
  updateTreeCanvas();

  // 西王母光轮
  updateQueenCanvas();

  // 瑶池星河
  updatePoolCanvas();
}

// ==== 青鸟风筝跟随系统：手势位置+深度直接映射 ====
// 视频参考：手在画面哪边→风筝在哪边；手近→风筝大；手远→风筝小
// 核心：取消鸟的自漂浮逻辑，改为完全由手势驱动位置
// 渐入机制：手刚入画时不猛冲，逐渐增强跟随力度
(function birdKiteTick(){
  requestAnimationFrame(birdKiteTick);
  if(!isBirdScene() || !bird.visible || !bird.active) return;

  var prox = window._handProximity || 0;
  var hasHand = prox > 0.03; // 极低阈值，更灵敏

  // 渐入因子：极速跟手
  if(!bird._kiteBlend) bird._kiteBlend = 0;
  if(hasHand){
    bird._kiteBlend = Math.min(1, bird._kiteBlend + 0.06); // ~0.28秒极速渐入
  } else {
    bird._kiteBlend = Math.max(0, bird._kiteBlend - 0.015);
  }

  var blend = bird._kiteBlend; // 0~1

  // 取消所有离散approach动画的干扰
  if(bird._approachTimer > 0){ bird._approachTimer = 0; bird._approachOrig = null; }

  // 自治目标（鸟的默认漂浮位置）
  var homeX = W * 0.45 + Math.sin(Date.now()/4000)*W*0.06;
  var homeY = H * 0.38 + Math.sin(Date.now()/3000)*H*0.06;

  // 风筝目标（手的位置）—— EMA平滑防抖
  if(!bird._smoothKiteX) bird._smoothKiteX = homeX;
  if(!bird._smoothKiteY) bird._smoothKiteY = homeY;
  var rawKiteX = W * (window._handCenterNX || 0.45);
  var rawKiteY = H * (window._handCenterNY || 0.38);
  var kSmooth = 0.30; // EMA极速跟手
  bird._smoothKiteX += (rawKiteX - bird._smoothKiteX) * kSmooth;
  bird._smoothKiteY += (rawKiteY - bird._smoothKiteY) * kSmooth;
  var kiteX = bird._smoothKiteX;
  var kiteY = bird._smoothKiteY;

  // 混合位置：blend=0→home，blend=1→kite
  var targetX = homeX + (kiteX - homeX) * blend;
  var targetY = homeY + (kiteY - homeY) * blend;

  // 位置插值
  var posLerp = 0.06 + 0.22 * blend; // 0.06→0.28 极速跟手
  bird.x += (targetX - bird.x) * posLerp;
  bird.y += (targetY - bird.y) * posLerp;

  // ★ 核心改动：缩放——手近→鸟大(飞近)，手远→鸟小(飞远)
  // 不再让prox=0时鸟缩到0.7！无手势时保持1.4，有手势时prox直接映射大小
  var autoScale = 1.4;
  // prox 0→1 映射到 0.6→3.0，手越近鸟越大
  var kiteScale = 0.5 + prox * 3.2;
  var targetScale = autoScale + (kiteScale - autoScale) * blend;
  bird.scale += (targetScale - bird.scale) * (0.12 + 0.30 * blend); // 0.12→0.42

  // ★ 手近→鸟下移（飞近镜头，透视变大下移），手远→鸟上移（飞远变小上移）
  var autoY = H * 0.38;
  var kiteBaseY = H * (0.55 - prox * 0.35); // prox=0→H*0.55(偏上/远), prox=1→H*0.20(偏下/近)
  // 额外的Y偏移叠加到targetY
  var proxYOffset = (kiteBaseY - autoY) * blend;
  bird.y += proxYOffset * 0.12; // 快速响应Y偏移

  // 翅膀速度：手近→翅膀快（振翅近飞），手远→翅膀慢（滑翔远飞）
  var autoSpeed = 0.05;
  var kiteSpeed = 0.04 + prox * 0.12;
  bird.wingSpeed = autoSpeed + (kiteSpeed - autoSpeed) * blend;

  // 风筝模式标记
  bird._kiteMode = blend > 0.3;

  // 移动拖尾星光
  var moveDist = Math.abs(targetX - bird.x) + Math.abs(targetY - bird.y);
  if(moveDist > 5 && Math.random() < 0.4 * blend){
    bird.sparkles.push({
      x: bird.x + (Math.random()-0.5)*30,
      y: bird.y + (Math.random()-0.5)*20,
      r: 1 + Math.random() * 2.5,
      alpha: 0.75 * blend,
      decay: 0.02 + Math.random() * 0.02,
      vx: (Math.random()-0.5)*2,
      vy: (Math.random()-0.5)*2
    });
  }

  // 快速拉近→喷射星光
  var pDelta = window._proxDelta || 0;
  if(pDelta > 0.03 && blend > 0.5){
    for(var si=0; si<8; si++){
      var ang = Math.random() * Math.PI * 2;
      var spd = 2 + Math.random() * 4;
      bird.sparkles.push({
        x: bird.x, y: bird.y,
        r: 1.5 + Math.random() * 2.5,
        alpha: 0.8,
        decay: 0.02 + Math.random() * 0.02,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd
      });
    }
  }

  // 翅膀相位只在这里更新（bird.update的kiteMode分支不再递增，避免重复）
  bird.wingPhase += bird.wingSpeed;

  // 拖尾星光（原有逻辑，降低频率避免过多）
  if(Math.random() < 0.25){
    bird.sparkles.push({
      x: bird.x + (Math.random()-0.5)*40,
      y: bird.y + (Math.random()-0.5)*25,
      r: 0.4+Math.random()*1.2,
      alpha: 0.65, decay: 0.018+Math.random()*0.025,
      vy: -(0.15+Math.random()*0.3)
    });
  }
  for(var s=bird.sparkles.length-1; s>=0; s--){
    var sp = bird.sparkles[s];
    sp.y += (sp.vy || 0); sp.x += (sp.vx || 0);
    sp.alpha -= sp.decay; sp.r *= 0.994;
    if(sp.alpha <= 0) bird.sparkles.splice(s,1);
  }
})();

// 累积canvas：记录手走过的区域（光照地图）
var spotAccum = document.createElement('canvas');
var spotAccumCtx = spotAccum.getContext('2d');

function spotResize(){
  spotCvs.width = window.innerWidth;
  spotCvs.height = window.innerHeight;
  spotAccum.width = window.innerWidth;
  spotAccum.height = window.innerHeight;
}
spotResize();
window.addEventListener('resize', spotResize);

function showSpotlight(){
  if(spotActive) return;
  spotActive = true;
  spotCvs.classList.add('on');
  spotTX = 0.5; spotTY = 0.5;
  spotX = 0.5; spotY = 0.5;
  spotCamInputActive = false;
  // 清空累积
  spotAccumCtx.clearRect(0, 0, spotAccum.width, spotAccum.height);
}
function hideSpotlight(){
  spotActive = false;
  spotCvs.classList.remove('on');
  for(var i=0; i<spotChars.length; i++){
    try{ document.body.removeChild(spotChars[i]); }catch(e){}
  }
  spotChars = [];
  spotSparkles = [];
}

function updateSpotlightPos(nx, ny){
  if(!spotActive) return;
  spotTX = nx;
  spotTY = ny;
}

// 渲染光斑
function renderSpotlight(){
  if(!spotActive) return;
  var cw = spotCvs.width, ch = spotCvs.height;
  if(cw === 0 || ch === 0) return;

  // 平滑跟随——摄像头快速EMA，鼠标慢速
  var smoothFactor = spotCamInputActive ? 0.5 : 0.25;
  spotX += (spotTX - spotX) * smoothFactor;
  spotY += (spotTY - spotY) * smoothFactor;
  spotR += (spotR_target - spotR) * 0.15;

  var px = spotX * cw;
  var py = spotY * ch;
  var r = spotR;

  // === 累积光照：手走过的地方永久变亮 ===
  // 用lighter模式叠加，每帧在手位置画强光，经过几次就全亮
  spotAccumCtx.save();
  spotAccumCtx.globalCompositeOperation = 'lighter';
  var agrd = spotAccumCtx.createRadialGradient(px, py, 0, px, py, r);
  agrd.addColorStop(0, 'rgba(120,100,50,0.35)');
  agrd.addColorStop(0.3, 'rgba(80,65,30,0.25)');
  agrd.addColorStop(0.6, 'rgba(40,32,15,0.15)');
  agrd.addColorStop(1, 'rgba(0,0,0,0)');
  spotAccumCtx.fillStyle = agrd;
  spotAccumCtx.beginPath();
  spotAccumCtx.arc(px, py, r, 0, Math.PI * 2);
  spotAccumCtx.fill();
  spotAccumCtx.restore();

  // === 主渲染 ===
  spotCtx.clearRect(0, 0, cw, ch);
  // 暗色遮罩
  spotCtx.fillStyle = 'rgba(4,3,12,0.92)';
  spotCtx.fillRect(0, 0, cw, ch);
  // 用累积canvas挖洞——已照亮区域透光
  spotCtx.globalCompositeOperation = 'destination-out';
  spotCtx.globalAlpha = 1.0;
  spotCtx.drawImage(spotAccum, 0, 0);
  spotCtx.globalAlpha = 1.0;
  spotCtx.globalCompositeOperation = 'source-over';

  // === 当前手位置强光（实时跟随）===
  spotCtx.save();
  spotCtx.globalCompositeOperation = 'lighter';
  var grd2 = spotCtx.createRadialGradient(px, py, 0, px, py, r * 1.3);
  grd2.addColorStop(0, 'rgba(255,235,150,0.35)');
  grd2.addColorStop(0.2, 'rgba(255,215,120,0.22)');
  grd2.addColorStop(0.5, 'rgba(212,168,83,0.10)');
  grd2.addColorStop(1, 'rgba(0,0,0,0)');
  spotCtx.fillStyle = grd2;
  spotCtx.beginPath();
  spotCtx.arc(px, py, r * 1.3, 0, Math.PI * 2);
  spotCtx.fill();
  // 光心
  var grd3 = spotCtx.createRadialGradient(px, py, 0, px, py, r * 0.3);
  grd3.addColorStop(0, 'rgba(255,252,230,0.50)');
  grd3.addColorStop(0.5, 'rgba(255,240,180,0.20)');
  grd3.addColorStop(1, 'rgba(0,0,0,0)');
  spotCtx.fillStyle = grd3;
  spotCtx.beginPath();
  spotCtx.arc(px, py, r * 0.3, 0, Math.PI * 2);
  spotCtx.fill();
  spotCtx.restore();

  // === 金色粒子 ===
  spotTime++;
  if(spotTime % 3 === 0 && spotSparkles.length < 35){
    var ang = Math.random() * Math.PI * 2;
    var dist = Math.random() * r * 0.8;
    spotSparkles.push({
      x: px + Math.cos(ang) * dist,
      y: py + Math.sin(ang) * dist,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -0.3 - Math.random() * 0.4,
      r: 1 + Math.random() * 2,
      alpha: 0.35 + Math.random() * 0.4,
      decay: 0.006 + Math.random() * 0.008
    });
  }
  spotCtx.save();
  spotCtx.globalCompositeOperation = 'lighter';
  for(var si = spotSparkles.length - 1; si >= 0; si--){
    var sp = spotSparkles[si];
    sp.x += sp.vx; sp.y += sp.vy; sp.alpha -= sp.decay;
    if(sp.alpha <= 0){ spotSparkles.splice(si, 1); continue; }
    spotCtx.fillStyle = 'rgba(255,220,120,' + sp.alpha + ')';
    spotCtx.beginPath();
    spotCtx.arc(sp.x, sp.y, sp.r, 0, Math.PI * 2);
    spotCtx.fill();
  }
  spotCtx.restore();

  // 定时浮现文字
  spotCharTimer++;
  if(spotCharTimer > 70 && spotChars.length < 10){
    spotCharTimer = 0;
    spawnSpotlightChar(px, py, r);
  }

  // 更新文字可见性
  for(var i = spotChars.length - 1; i >= 0; i--){
    var c = spotChars[i];
    var dx = c._cx - px, dy = c._cy - py;
    var dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < r * 0.9){
      c.classList.add('visible');
      c.classList.remove('fade');
    } else if(dist > r * 1.5){
      c.classList.remove('visible');
      c.classList.add('fade');
    }
    c._cy -= 0.12;
    c.style.top = c._cy + 'px';
  }
}

// 光斑内生成浮动文字
function spawnSpotlightChar(cx, cy, r){
  var angle = Math.random() * Math.PI * 2;
  var dist = Math.random() * r * 0.55;
  var x = cx + Math.cos(angle) * dist;
  var y = cy + Math.sin(angle) * dist;
  var ch = document.createElement('div');
  ch.className = 'spotlight-char';
  ch.style.left = x + 'px';
  ch.style.top = y + 'px';
  ch.style.fontSize = (20 + Math.random() * 18) + 'px';
  ch.style.letterSpacing = (2 + Math.random() * 4) + 'px';
  ch.textContent = spotCharPool[spotCharIdx++ % spotCharPool.length];
  ch._cx = x; ch._cy = y;
  document.body.appendChild(ch);
  spotChars.push(ch);
  setTimeout(function(){
    ch.classList.remove('visible');
    ch.classList.add('fade');
    setTimeout(function(){
      try{ document.body.removeChild(ch); }catch(e){}
      var idx = spotChars.indexOf(ch);
      if(idx >= 0) spotChars.splice(idx, 1);
    }, 1500);
  }, 5000);
}

// 鼠标/触摸追踪（非摄像头时的回退）——直接用clientX/clientY，不走getPos
document.addEventListener('mousemove', function(e){
  if(!spotActive) return;
  spotTX = e.clientX / window.innerWidth;
  spotTY = e.clientY / window.innerHeight;
});
document.addEventListener('touchmove', function(e){
  if(!spotActive) return;
  if(e.touches.length > 0){
    spotTX = e.touches[0].clientX / window.innerWidth;
    spotTY = e.touches[0].clientY / window.innerHeight;
  }
});

(function _spotTick(){

  renderSpotlight();
})();

// 比1 → 落笔成字：笔尖点下，墨晕化开，浮现一个字
var endChars = ['昆','仑','谣','墨','诗','文','字','始','生','风','鹤','梦','笔','心','道','归'];
function endInkScatter(x, y){
  // 墨滴落点
  var drop = document.createElement('div');
  drop.style.cssText = 'position:fixed;left:'+(x-6)+'px;top:'+(y-6)+'px;width:12px;height:12px;z-index:8;pointer-events:none;border-radius:50%;background:radial-gradient(circle,rgba(30,20,10,0.9) 0%,rgba(30,20,10,0.3) 60%,transparent 100%);opacity:1;transition:transform 1.2s cubic-bezier(.2,.8,.3,1),opacity 1.5s;';
  document.body.appendChild(drop);
  // 墨晕扩散
  var halo = document.createElement('div');
  halo.style.cssText = 'position:fixed;left:'+(x-3)+'px;top:'+(y-3)+'px;width:6px;height:6px;z-index:7;pointer-events:none;border-radius:50%;border:1px solid rgba(212,168,83,0.4);opacity:0.8;transition:all 1.8s cubic-bezier(.2,.6,.3,1);';
  document.body.appendChild(halo);
  requestAnimationFrame(function(){
    drop.style.transform = 'scale(1.5)';
    drop.style.opacity = '0';
    halo.style.width = '60px'; halo.style.height = '60px';
    halo.style.left = (x-30)+'px'; halo.style.top = (y-30)+'px';
    halo.style.opacity = '0';
  });
  // 字浮现——像笔尖落纸
  var ch = endChars[Math.floor(Math.random()*endChars.length)];
  var el = document.createElement('div');
  el.style.cssText = 'position:fixed;left:'+(x-14)+'px;top:'+(y-30)+'px;z-index:9;pointer-events:none;font-size:22px;font-weight:700;letter-spacing:2px;color:rgba(40,30,20,0.85);text-shadow:0 0 6px rgba(212,168,83,0.2);opacity:0;transition:opacity 0.8s 0.3s,transform 1.2s 0.3s cubic-bezier(.2,.8,.3,1);transform:scale(0.3) translateY(10px);';
  el.textContent = ch;
  document.body.appendChild(el);
  requestAnimationFrame(function(){el.style.opacity='1';el.style.transform='scale(1) translateY(-15px)';});
  setTimeout(function(){
    el.style.opacity='0'; el.style.transform='scale(0.9) translateY(-40px)';
    setTimeout(function(){try{document.body.removeChild(el);}catch(e){}},1000);
  },2800);
  setTimeout(function(){try{document.body.removeChild(drop);document.body.removeChild(halo);}catch(e){}},1800);
  // 柔和涟漪
  spawnRipple(x, y);
}

// 出拳 → 砚中墨韵：墨滴入砚，涟漪层叠扩散
function endBurst(x, y){
  // 三层涟漪，像墨入水
  for(var ri=0; ri<3; ri++){
    (function(ri){
      setTimeout(function(){
        var ring = document.createElement('div');
        var sz = 20 + ri*15;
        ring.style.cssText = 'position:fixed;left:'+(x-sz/2)+'px;top:'+(y-sz/2)+'px;width:'+sz+'px;height:'+sz+'px;z-index:7;pointer-events:none;border-radius:50%;border:1.5px solid rgba(212,168,83,'+(0.5-ri*0.12)+');opacity:1;transition:all 2s cubic-bezier(.2,.6,.3,1);';
        document.body.appendChild(ring);
        requestAnimationFrame(function(){
          var finalSz = 120 + ri*60;
          ring.style.width = finalSz+'px'; ring.style.height = finalSz+'px';
          ring.style.left = (x-finalSz/2)+'px'; ring.style.top = (y-finalSz/2)+'px';
          ring.style.opacity = '0';
        });
        setTimeout(function(){try{document.body.removeChild(ring);}catch(e){}},2200);
      }, ri*200);
    })(ri);
  }
  // 微量墨粒子——像研墨时溅出的细墨
  for(var i=0; i<6; i++){
    var ang=Math.random()*Math.PI*2, spd=1+Math.random()*2;
    inkParticles.push({
      x:x, y:y,
      vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-0.5,
      r:1.5+Math.random()*2, alpha:0.6,
      decay:0.01+Math.random()*0.01,
      color:'rgba(40,30,20,'
    });
  }
}

// 挥手 → 续写昆仑：书法笔迹缓缓游走，像墨生在续写
function endEcho(){
  var strokes = [
    {text:'墨', x:0.3, y:0.35},
    {text:'生', x:0.5, y:0.4},
    {text:'执', x:0.4, y:0.55},
    {text:'笔', x:0.6, y:0.5},
    {text:'始', x:0.5, y:0.6}
  ];
  var pick = strokes[Math.floor(Math.random()*strokes.length)];
  var px = W*pick.x + (Math.random()-0.5)*40;
  var py = H*pick.y + (Math.random()-0.5)*30;
  var el = document.createElement('div');
  el.style.cssText = 'position:fixed;left:'+px+'px;top:'+py+'px;z-index:9;pointer-events:none;font-size:32px;font-weight:900;letter-spacing:6px;color:rgba(40,30,20,0.7);text-shadow:0 0 12px rgba(212,168,83,0.25);opacity:0;transition:opacity 1s,transform 2.5s cubic-bezier(.2,.6,.3,1);transform:scale(0.4);';
  el.textContent = pick.text;
  document.body.appendChild(el);
  // 像笔画写出来的感觉
  requestAnimationFrame(function(){el.style.opacity='1';el.style.transform='scale(1)';});
  setTimeout(function(){
    el.style.opacity='0'; el.style.transform='scale(0.95) translateY(-30px)';
    setTimeout(function(){try{document.body.removeChild(el);}catch(e){}},1500);
  },3000);
}

// ---- 在 doStep 中注入场景提示 ----
var _origDoStep = doStep;
doStep = function(i){
  _origDoStep(i);
  var t = TL[i];
  if(t && t.shot){
    hideSceneHint();
    setTimeout(function(){ showSceneHint(t.shot); }, 800);
    // s11 spotlight 激活/关闭
    if(t.shot === 's11'){
      setTimeout(function(){ showSpotlight(); }, 1500);
    } else {
      hideSpotlight();
    }
  } else {
    hideSceneHint();
    hideSpotlight();
  }
};

// ---- 粒子池 ----
var inkParticles = [];
function drawInkParticles(){
  for(var i=inkParticles.length-1; i>=0; i--){
    var p=inkParticles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.alpha-=p.decay; p.r*=0.97;
    if(p.alpha<=0){inkParticles.splice(i,1);continue;}
    ictx.save();
    ictx.globalAlpha=p.alpha;
    ictx.fillStyle=p.color+p.alpha+')';
    ictx.beginPath(); ictx.arc(p.x,p.y,p.r,0,Math.PI*2); ictx.fill();
    ictx.restore();
  }
}
setInterval(function(){drawInkParticles();},16);

// ==== 举手 · 鸟飞近镜头效果 ====
function birdsApproach(){
  var cx = W * 0.5, cy = H * 0.45;

  // --- 青鸟飞近：引导到屏幕中心并放大 ---
  if(isBirdActive() && bird.visible){
    bird.guideTo(cx, cy);
    // 临时放大青鸟
    var origScale = bird.scale || 1;
    if(!bird._approachOrig) bird._approachOrig = origScale;
    bird._approachTarget = origScale * 1.9;
    bird._approachTimer = 90;
    // 额外粒子光晕
    for(var sp=0; sp<18; sp++){
      var ang2 = Math.random() * Math.PI * 2;
      var spd2 = 2 + Math.random() * 5;
      bird.sparkles.push({
        x: bird.x, y: bird.y,
        r: 1.5 + Math.random() * 4,
        alpha: 0.85,
        decay: 0.015 + Math.random() * 0.025,
        vx: Math.cos(ang2) * spd2,
        vy: Math.sin(ang2) * spd2
      });
    }
  }

  // --- 仙鹤飞近：轨道中心漂向屏幕中心 + 放大 ---
  if(isCraneActive()){
    for(var ci2=0; ci2<cranes.length; ci2++){
      var cr3 = cranes[ci2];
      if(!cr3.visible || cr3.fleeing) continue;
      // 保存原始参数
      if(!cr3._origCx){
        cr3._origCx = cr3.cx; cr3._origCy = cr3.cy;
        cr3._origScale = cr3.scale;
        cr3._origRx = cr3.rx; cr3._origRy = cr3.ry;
      }
      cr3._approachTimer = 110;
      cr3._approachPhase = 'in';
    }
  }
}

// 在 loop() 之前定期驱动鸟飞近动画
(function _approachTick(){
  requestAnimationFrame(_approachTick);
  // 青鸟缩放驱动
  if(bird._approachTimer > 0){
    bird._approachTimer--;
    if(bird._approachTimer > 60){
      // 飞近阶段：scale 向目标插值
      bird.scale += (bird._approachTarget - bird.scale) * 0.07;
    } else {
      // 飞远阶段：恢复原始
      var orig = bird._approachOrig || 1;
      bird.scale += (orig - bird.scale) * 0.06;
    }
    if(bird._approachTimer === 0){
      bird.scale = bird._approachOrig || 1;
      bird._approachOrig = null;
    }
  }

  // 仙鹤飞近驱动
  for(var ci3=0; ci3<cranes.length; ci3++){
    var cr4 = cranes[ci3];
    if(!cr4._approachTimer) continue;
    if(cr4._approachTimer > 0){
      cr4._approachTimer--;
      var halfT = 55;
      if(cr4._approachTimer > halfT){
        // 飞近：轨道中心向屏幕中心移动，半径缩小，scale 变大
        cr4.cx += (W * 0.5 - cr4.cx) * 0.04;
        cr4.cy += (H * 0.45 - cr4.cy) * 0.04;
        cr4.rx += (cr4.rx * 0.3 - cr4.rx) * 0.04;
        cr4.ry += (cr4.ry * 0.3 - cr4.ry) * 0.04;
        cr4.scale += (cr4._origScale * 2.2 - cr4.scale) * 0.05;
      } else {
        // 飞远：恢复原始参数
        cr4.cx += (cr4._origCx - cr4.cx) * 0.05;
        cr4.cy += (cr4._origCy - cr4.cy) * 0.05;
        cr4.rx += (cr4._origRx - cr4.rx) * 0.05;
        cr4.ry += (cr4._origRy - cr4.ry) * 0.05;
        cr4.scale += (cr4._origScale - cr4.scale) * 0.05;
      }
      if(cr4._approachTimer === 0){
        // 强制恢复
        cr4.cx = cr4._origCx; cr4.cy = cr4._origCy;
        cr4.rx = cr4._origRx; cr4.ry = cr4._origRy;
        cr4.scale = cr4._origScale;
        cr4._origCx = null;
        cr4._approachTimer = undefined;
      }
    }
  }
})();

// ==== 摄像头 + 运动检测 v3 ====
var camVideo=null, camStream=null, camActive=false;
var procCanvas=null, procCtx=null;
var prevGray=null;                    // 上一帧灰度
var motionRing=[];                    // 最近N帧运动能量
var RING_SIZE=20;                     // 运动历史长度
var GESTURE_CD=20;                    // 触发后冷却帧数（40→20，约2秒）
var gestureCooldown=0;
var energyPeak=0;                     // 当前运动峰值
var peakDecay=0.96;                   // 峰值衰减系数（0.92→0.96，衰减更慢，脉冲更容易累积）
var energyThreshold=1.5;              // 触发阈值（2.5→1.5，更灵敏）
var handPositions=[];                 // 手部位置历史 [{x,y}]
var POS_HISTORY=8;
var debugInfo='';

function initCamera(){
  if(camActive)return;
  procCanvas=document.createElement('canvas');
  procCanvas.width=160; procCanvas.height=120;
  procCtx=procCanvas.getContext('2d');
  camVideo=document.createElement('video');
  camVideo.autoplay=true; camVideo.playsInline=true; camVideo.muted=true;
  camVideo.setAttribute('playsinline','');
  camVideo.width=160; camVideo.height=120;
  camVideo.style.cssText='position:fixed;left:-9999px;top:-9999px';
  document.body.appendChild(camVideo);
  camBtn.textContent='请求摄像头…';
  camBtn.style.opacity='0.5';

  navigator.mediaDevices.getUserMedia({video:{width:320,height:240,facingMode:'user'}})
  .then(function(stream){
    camStream=stream; camVideo.srcObject=stream;
    return camVideo.play();
  })
  .then(function(){
    camActive=true;
    camCanvas.style.display='block'; gestureHud.style.display='block';
    helpBtn.style.display='block';
    camBtn.textContent='手势 ✓'; camBtn.style.opacity='0.7';
    prevGray=null; motionRing=[]; handPositions=[];
    energyPeak=0; gestureCooldown=0;
    showGuide();
    processFrame();
  })
  .catch(function(e){
    camBtn.textContent='⨯ '+ (e.name||'失败');
    camBtn.style.opacity='0.4'; camActive=false;
  });
}

var _pfSkip=0;
function processFrame(){
  if(!camActive)return;
  requestAnimationFrame(processFrame);

  // 限速：每2帧做一次像素运算（3→2，实际~15fps，更灵敏），预览每帧更新
  camCtx.save();
  camCtx.clearRect(0,0,160,120);
  camCtx.translate(160,0); camCtx.scale(-1,1);
  camCtx.drawImage(camVideo,0,0,160,120);
  camCtx.restore();

  _pfSkip++;
  if(_pfSkip < 2) return;
  _pfSkip = 0;

  // 画视频帧到处理画布（用于像素分析）
  procCtx.save();
  procCtx.clearRect(0,0,160,120);
  procCtx.translate(160,0); procCtx.scale(-1,1);
  procCtx.drawImage(camVideo,0,0,160,120);
  procCtx.restore();
  var fd=procCtx.getImageData(0,0,160,120);
  var px=fd.data;

  // ---- 下采样加速：只取每4x4块的平均亮度 ----
  var W=160, H=120, STEP=4;
  var cw=Math.floor(W/STEP), ch=Math.floor(H/STEP);
  var gray=new Uint8Array(cw*ch);
  var idx=0;
  for(var gy=0; gy<ch; gy++){
    for(var gx=0; gx<cw; gx++){
      var sum=0, cnt=0;
      for(var dy=0; dy<STEP; dy++){
        for(var dx=0; dx<STEP; dx++){
          var pi=((gy*STEP+dy)*W+(gx*STEP+dx))*4;
          sum+=px[pi]+px[pi+1]+px[pi+2]; cnt++;
        }
      }
      gray[idx++]=Math.round(sum/(cnt*3));
    }
  }

  // ---- 帧差分运动能量 ----
  var energy=0;
  var motionWeightedX=0, motionWeightedY=0, motionCount=0;
  if(prevGray){
    for(var i=0; i<cw*ch; i++){
      var diff=Math.abs(gray[i]-prevGray[i]);
      if(diff>8){ // 帧差阈值（12→8，捕捉更细微的运动）
        energy+=diff;
        var mx=i%cw, my=Math.floor(i/cw);
        motionWeightedX+=mx*diff; motionWeightedY+=my*diff;
        motionCount++;
      }
    }
  }
  prevGray=gray;

  // 归一化运动能量
  var rawEnergy=energy/(cw*ch);
  
  // 运动能量平滑
  motionRing.push(rawEnergy);
  if(motionRing.length>RING_SIZE)motionRing.shift();

  // 计算基线（静止时的平均能量）
  var baseline=0, bc=0;
  for(var mi=0; mi<motionRing.length; mi++){
    if(motionRing[mi]<1.0){baseline+=motionRing[mi]; bc++;}
  }
  baseline=bc>0?baseline/bc:0.3;

  // 峰值追踪（上升快下降慢，捕捉脉冲）
  if(rawEnergy>energyPeak)energyPeak=rawEnergy;
  else energyPeak=energyPeak*peakDecay+(1-peakDecay)*rawEnergy;

  // ---- 动作区域质心 ----
  var motionCX=motionCount>0?motionWeightedX/motionCount:cw/2;
  var motionCY=motionCount>0?motionWeightedY/motionCount:ch/2;

  // 追踪运动质心
  handPositions.push({x:motionCX, y:motionCY});
  if(handPositions.length>POS_HISTORY)handPositions.shift();

  // ---- 手势判定：峰值触发 ----
  var relativeSpike=baseline>0.05?energyPeak/baseline:energyPeak/0.3;
  var triggered=false;
  var gestureType='';

  if(energyPeak>energyThreshold && gestureCooldown<=0 && motionCount>5){
    // 有足够运动 → 判断方向
    var dirX=0, dirY=0;
    if(handPositions.length>=4){
      // 首尾位置差
      var first=handPositions[0];
      var last=handPositions[handPositions.length-1];
      dirX=last.x-first.x;
      dirY=last.y-first.y;
    }

    // 横移幅度 > 纵移 → 挥手
    // 阈值从2降到1.2：肤色中心追踪后dirX更灵敏，1.2足够识别真实挥手
    if(Math.abs(dirX)>Math.abs(dirY)*0.8 && Math.abs(dirX)>1.2){
      gestureType='open';
      triggered=true;
    }
    // 纵移明显（上下/前后）→ 出拳
    else if(Math.abs(dirY)>2 || Math.abs(dirX)<=1.2){
      gestureType='fist';
      triggered=true;
    }
  }

  // ==== 肤色分析（必须在举手检测之前初始化） ====
  var rowProfile=new Uint16Array(120); // 每行肤色像素数
  var skinBlob={minX:160,maxX:0,minY:120,maxY:0,total:0};
  var skinCXSum=0, skinCYSum=0; // 像素加权质心累加（比边界框中心更灵敏）
  var skinTopCXSum=0, skinTopCYSum=0, skinTopCount=0; // 上半区质心（排除脸/身体）
  for(var py=0; py<120; py++){
    var rowCount=0;
    for(var pxx=0; pxx<160; pxx++){
      var pi=(py*160+pxx)*4;
      var r=px[pi], g=px[pi+1], b=px[pi+2];
      // 肤色判定（放宽条件：降低(r-g)上限到100，降低(r-b)下限到15，支持更多肤色/光照）
      if(r>75 && g>30 && b>15 && r>g && g>b && (r-b)>15 && (r-g)>8 && (r-g)<100){
        rowCount++;
        skinCXSum+=pxx; skinCYSum+=py; // 质心累加
        if(pxx<skinBlob.minX)skinBlob.minX=pxx;
        if(pxx>skinBlob.maxX)skinBlob.maxX=pxx;
        if(py<skinBlob.minY)skinBlob.minY=py;
        if(py>skinBlob.maxY)skinBlob.maxY=py;
        skinBlob.total++;
        // 上半区（0-59行）单独统计——手在上方时质心更准
        if(py < 60){
          skinTopCXSum+=pxx; skinTopCYSum+=py; skinTopCount++;
        }
      }
    }
    rowProfile[py]=rowCount;
  }
  // 像素加权质心（归一化到0-1）
  // 优先用上半区质心（排除脸/身体影响），上半区像素不够时退回全画面质心
  var skinCentroidNX, skinCentroidNY;
  if(skinTopCount > 60){
    skinCentroidNX = (skinTopCXSum / skinTopCount) / 160;
    skinCentroidNY = (skinTopCYSum / skinTopCount) / 120;
  } else if(skinBlob.total > 50){
    skinCentroidNX = (skinCXSum / skinBlob.total) / 160;
    skinCentroidNY = (skinCYSum / skinBlob.total) / 120;
  } else {
    skinCentroidNX = 0.5; skinCentroidNY = 0.5;
  }
  window._skinCentroidNX = skinCentroidNX;
  window._skinCentroidNY = skinCentroidNY;

  // ==== 关键修复：用肤色区域中心替换运动质心 ====
  // 运动质心(motionCX)是所有运动像素的加权中心，挥手时像素分散在轨迹两侧，
  // 质心几乎不动，导致dirX永远<2 → 挥手永远检测不到。
  // 肤色区域中心真正跟随手的位置，替换后handPositions才能追踪手的真实轨迹。
  if(skinBlob.total > 300 && handPositions.length > 0){
    handPositions[handPositions.length-1] = {
      x: (skinBlob.minX + skinBlob.maxX) / 2 / STEP,
      y: (skinBlob.minY + skinBlob.maxY) / 2 / STEP
    };
  }

  // ==== 手势深度代理：肤色区域大小≈手距摄像头远近 ====
  // 手越近→肤色像素越多→proximity越高→青鸟越大越近
  if(!window._handProxSmooth) window._handProxSmooth = 0;
  if(skinBlob.total > 200){
    // 放宽范围：200~2500（手近时通常800-1500，手远时300-600）
    var _rawProx = Math.min(1, Math.max(0, (skinBlob.total - 200) / 2300));
    window._handProxSmooth += (_rawProx - window._handProxSmooth) * 0.25; // 更快响应proximity变化
    // 肤色区域中心归一化（0-1），供青鸟位置跟随
    window._handCenterNX = ((skinBlob.minX + skinBlob.maxX) / 2) / 160;
    window._handCenterNY = ((skinBlob.minY + skinBlob.maxY) / 2) / 120;
  } else {
    window._handProxSmooth += (0 - window._handProxSmooth) * 0.08;
  }
  window._handProximity = window._handProxSmooth;
  if(!window._prevProx) window._prevProx = 0;
  window._proxDelta = window._handProximity - window._prevProx;

  // ==== s11 spotlight: 手部追踪驱动光斑位置 ====
  // 用像素加权质心（非边界框中心），上半区优先（排除脸/身体拉扯）
  if(spotActive && skinBlob.total > 100){
    spotCamInputActive = true;
    var rawHX = window._skinCentroidNX; // 像素加权质心（已优先取上半区）
    var rawHY = window._skinCentroidNY;
    // 上半区质心Y范围约0.05~0.45，需要映射到0~1全屏
    // X轴3.0×放大（质心横向响应好），Y轴用线性映射覆盖全屏
    var spotHandX = Math.max(0, Math.min(1, 0.5 + (rawHX - 0.5) * 3.0));
    var spotHandY = Math.max(0, Math.min(1, rawHY * 2.5)); // 上半区0~0.45 → 0~1.1
    spotTX = spotHandX;
    spotTY = spotHandY;
    // 手越近光斑越大
    spotR_target = 60 + Math.min(1, skinBlob.total / 1200) * 80;
  } else if(spotActive && skinBlob.total <= 100) {
    // 手离开画面，保持最后位置
  }
  window._prevProx = window._handProximity;

  // ==== 举手检测：手在画面上方 → 鸟飞近镜头（skinBlob已初始化，放这里才安全）====
  if(!window._raiseStable) window._raiseStable = 0;
  var skinCY = (skinBlob.total > 300) ? ((skinBlob.minY + skinBlob.maxY) / 2) : 999;
  var handRaised = (skinBlob.total > 300) && (skinCY < 54);
  if(handRaised){ window._raiseStable++; }
  else { window._raiseStable = Math.max(0, window._raiseStable - 2); }
  if(window._raiseStable >= 15 && gestureCooldown <= 0){
    // 鸟场景中proximity已接管→跳过discrete approach，避免抢夺scale控制权
    if(!isBirdScene() || (window._handProximity||0) < 0.05){
      birdsApproach();
    }
    gestureHud.textContent = '🙌 举手 · 鸟飞近';
    gestureCooldown = GESTURE_CD * 2;
    window._raiseStable = 0;
    energyPeak = 0;
  }

  // 竖列分析：从上往下扫描，找手指→手掌过渡
  // ==== 比指检测 v2：放宽阈值，提高识别率 ====
  var oneFingerDetected=false;
  if(skinBlob.total>200 && (skinBlob.maxY-skinBlob.minY)>20){
    var fingerTop=-1, fingerBottom=-1;
    var fingerMax=0; // 手指区域最大宽度
    var handMax=0;   // 手掌区域最大宽度
    var inFinger=true;

    for(var py=skinBlob.minY; py<=skinBlob.maxY; py++){
      var cnt=rowProfile[py];
      if(inFinger){
        // 还在手指区：宽度窄
        if(cnt>fingerMax)fingerMax=cnt;
        if(cnt>15){ // 从25降到15：手掌不必那么宽也算过渡
          handMax=cnt;
          inFinger=false;
          fingerBottom=py;
        }
      } else {
        // 在手掌区
        if(cnt>handMax)handMax=cnt;
      }
    }

    // 判定条件（放宽）：手指窄(<22px) → 手掌宽(>fingerMax*1.8)，手指至少6行高
    if(fingerMax>2 && fingerMax<22 && handMax>fingerMax*1.8 && fingerBottom>0 && (fingerBottom-skinBlob.minY)>6){
      oneFingerDetected=true;
    }
  }

  // ==== 握拳检测已移除（静态姿态检测太慢不可靠，出拳效果统一由运动检测触发） ====

  // 1指手势防抖（8帧即触发，衰减慢，避免被闪烁中断）
  if(!window._fingerStable)window._fingerStable=0;
  if(oneFingerDetected){
    window._fingerStable++;
  } else {
    window._fingerStable=Math.max(0, window._fingerStable-1);
  }

  if(window._fingerStable>=8 && gestureCooldown<=0){
    var _fx=W*0.5+(Math.random()-0.5)*60, _fy=H*0.55+(Math.random()-0.5)*40;
    if(isBirdScene()){
      for(var fi=0;fi<8;fi++){var ang=Math.random()*Math.PI*2,spd=2+Math.random()*4;inkParticles.push({x:_fx,y:_fy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-1.5,r:2+Math.random()*4,alpha:0.85,decay:0.015+Math.random()*0.015,color:Math.random()<0.5?'rgba(200,220,255,':'rgba(255,230,150,'});}
      spawnRipple(_fx,_fy);
      gestureHud.textContent='\u261d\ufe0f \u6bd41 \u00b7 \u661f\u5149\u6563\u5c04';
    } else if(isKunlunActive()){
      for(var fi=0;fi<2;fi++){(function(fi){setTimeout(function(){var sl=document.createElement('div');sl.style.cssText='position:fixed;left:'+_fx+'px;top:'+_fy+'px;z-index:6;pointer-events:none;width:2px;height:0;background:linear-gradient(to top,rgba(212,168,83,0.6),rgba(212,168,83,0));border-radius:1px;transition:height 0.6s cubic-bezier(.2,.8,.3,1)';document.body.appendChild(sl);requestAnimationFrame(function(){sl.style.height=(100+fi*30)+'px';sl.style.opacity='0';});setTimeout(function(){try{document.body.removeChild(sl);}catch(e){}},700);},fi*80);})(fi);}
      spawnRipple(_fx,_fy);
      gestureHud.textContent='\u261d\ufe0f \u6bd41 \u00b7 \u53f0\u9636\u5149\u7eb9';
    } else if(isTreeActive()){
      treeGlow(_fx,_fy,true);treeFlash(_fx,_fy);spawnTreeWord(_fx,_fy-40);spawnRipple(_fx,_fy);
      gestureHud.textContent='\u261d\ufe0f \u6bd41 \u00b7 \u8bd7\u53e5\u6d6e\u73b0';
    } else if(isQueenActive()){
      queenBurst(_fx, _fy, false); spawnRipple(_fx, _fy);
      gestureHud.textContent='\u261d\ufe0f \u6bd41 \u00b7 \u91d1\u5149\u6563\u5c04';
    } else if(isPoolActive()){
      spawnPoolChar(_fx+(Math.random()-0.5)*60,_fy+(Math.random()-0.5)*40);poolBurst(_fx,_fy,false);spawnRipple(_fx,_fy);
      gestureHud.textContent='\u261d\ufe0f \u6bd41 \u00b7 \u53e4\u6587\u6d6e\u73b0';
    } else if(isEndActive()){
      // s11: 光斑脉冲——比1时让光斑闪亮
      spotR_target = 160;
      setTimeout(function(){ spotR_target = 80; }, 700);
      spawnSpotlightChar(spotX * window.innerWidth, spotY * window.innerHeight, spotR);
      gestureHud.textContent='\u261d\ufe0f \u6bd41 \u00b7 \u5149\u6591\u8109\u51b2';
    } else {
      punchEffect();
      gestureHud.textContent='\u261d\ufe0f \u6bd41 \u00b7 \u58a8\u6563';
    }
    gestureCooldown=GESTURE_CD;
    window._fingerStable=0;
    energyPeak=0;
  }

  // ==== 握拳触发已移除 ====

  // ---- \u6267\u884c\u89e6\u53d1\uff1a\u624b\u52bf\u2192\u573a\u666f\u4ea4\u4e92 ----
  if(triggered){
    var _gx=W*0.5+(Math.random()-0.5)*60, _gy=H*0.55+(Math.random()-0.5)*40;
    if(gestureType==='fist'){
      if(isBirdScene()){
        for(var si=0;si<20;si++){var ang=Math.random()*Math.PI*2,spd=3+Math.random()*7;inkParticles.push({x:_gx,y:_gy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-3,r:2+Math.random()*5,alpha:0.9,decay:0.012+Math.random()*0.012,color:['rgba(120,180,255,','rgba(200,220,255,','rgba(255,230,150,','rgba(180,210,255,'][si%4]});}
        spawnRipple(_gx,_gy);
        gestureHud.textContent='\u270a \u51fa\u62f3 \u00b7 \u9752\u9e1f\u632f\u7fc5';
      } else if(isKunlunActive()){
        for(var ki=0;ki<3;ki++){(function(ki){setTimeout(function(){var sl=document.createElement('div');sl.style.cssText='position:fixed;left:'+_gx+'px;top:'+_gy+'px;z-index:6;pointer-events:none;width:2px;height:0;background:linear-gradient(to top,rgba(212,168,83,0.6),rgba(212,168,83,0));border-radius:1px;transition:height 0.6s cubic-bezier(.2,.8,.3,1)';document.body.appendChild(sl);requestAnimationFrame(function(){sl.style.height=(120+ki*40)+'px';sl.style.opacity='0';});setTimeout(function(){try{document.body.removeChild(sl);}catch(e){}},700);},ki*100);})(ki);}
        spawnRipple(_gx,_gy);
        gestureHud.textContent='\u270a \u51fa\u62f3 \u00b7 \u53f0\u9636\u5149\u7eb9';
      } else if(isQueenActive()){
        queenBurst(_gx, _gy, false); spawnRipple(_gx, _gy);
        gestureHud.textContent='\u270a \u51fa\u62f3 \u00b7 \u58a8\u7206\u91d1\u5149';
      } else if(isEndActive()){
        // s11: 光斑扩散——出拳时光斑扩大再收缩
        spotR_target = 180;
        for(var ebi=0;ebi<3;ebi++){
          (function(ebi){
            setTimeout(function(){ spawnSpotlightChar(spotX*window.innerWidth, spotY*window.innerHeight, spotR); }, ebi*300);
          })(ebi);
        }
        setTimeout(function(){ spotR_target = 80; }, 900);
        gestureHud.textContent='\u270a \u51fa\u62f3 \u00b7 \u5149\u6591\u6269\u6563';
      } else {
        punchEffect();
        gestureHud.textContent='\u270a \u51fa\u62f3 \u00b7 \u58a8\u7206';
      }
    } else {
      if(isTreeActive()){
        treeBloomFull();
        // 全屏金色闪光
        var gfl=document.createElement('div');
        gfl.style.cssText='position:fixed;inset:0;z-index:7;pointer-events:none;background:radial-gradient(circle at 50% 45%,rgba(255,220,80,0.25) 0%,rgba(255,200,60,0.08) 40%,transparent 70%);opacity:1;transition:opacity 1.5s ease-out;';
        document.body.appendChild(gfl);
        requestAnimationFrame(function(){gfl.style.opacity='0';});
        setTimeout(function(){try{document.body.removeChild(gfl);}catch(e){}},2000);
        gestureHud.textContent='\ud83c\udf1f \u5f20\u624b \u00b7 \u795e\u6811\u7efd\u5149';
      } else if(isQueenActive()){
        queenBloomFull();
        gestureHud.textContent='\u2600 \u5f20\u624b \u00b7 \u5149\u8f6e\u8f89\u6620';
      } else if(isPoolActive()){
        poolBloomFull();
        gestureHud.textContent='\ud83c\udf0a \u5f20\u624b \u00b7 \u7476\u6c60\u661f\u6cb3';
      } else if(isEndActive()){
        // s11: 挥手→光斑中文字涌出
        for(var eci=0;eci<5;eci++){
          (function(eci){
            setTimeout(function(){ spawnSpotlightChar(spotX*window.innerWidth+(Math.random()-0.5)*80, spotY*window.innerHeight+(Math.random()-0.5)*60, spotR); }, eci*200);
          })(eci);
        }
        gestureHud.textContent='\ud83d\udc4b \u6325\u624b \u00b7 \u58a8\u8ff9\u6d6e\u73b0';
      } else if(isFogActive()){
        fogDissipate(function(){
          if(tlIdx<TL.length-1){clearTimeout(tlTimer); doStep(tlIdx+1);}
        });
        gestureHud.textContent='\ud83d\udc4b \u6325\u624b \u00b7 \u96fe\u6c14\u6e10\u6563';
      } else {
        if(tlIdx<TL.length-1){clearTimeout(tlTimer); doStep(tlIdx+1);}
        gestureHud.textContent='\ud83d\udc4b \u6325\u624b \u00b7 \u5207\u573a\u666f';
      }
    }
    gestureCooldown=GESTURE_CD;
    energyPeak=0;
  }

  if(gestureCooldown>0)gestureCooldown--;

  // ---- 预览绘制（精简：只保留肤色框，去掉调试文字） ----
  if(skinBlob.total>200){
    camCtx.strokeStyle='rgba(160,200,220,0.35)';
    camCtx.lineWidth=1;
    camCtx.strokeRect(skinBlob.minX, skinBlob.minY, skinBlob.maxX-skinBlob.minX, skinBlob.maxY-skinBlob.minY);
  }

  // ---- HUD（手势结果 + 青鸟距离指示） ----
  var hud='';
  if(isBirdScene() && (window._handProximity||0) > 0.08){
    var bars = Math.round(window._handProximity * 5);
    hud += '\uD83D\uDC26';
    for(var bi=0;bi<5;bi++) hud += bi<bars?'\u2501':'\u254C';
    hud += ' ';
  }
  if(gestureCooldown>0) hud+='CD '+gestureCooldown;
  if(motionCount>5 && hud.indexOf('\uD83D\uDC26')<0) hud+='\uD83D\uDC41';
  if(oneFingerDetected) hud+='\u261D';
  gestureHud.textContent=hud;

  // ---- 青鸟场景：在鸟Canvas上画手势追踪指示 ----
  if(isBirdScene() && (window._handProximity||0) > 0.08 && window._handCenterNX !== undefined){
    bctx.save();
    var hx = W * window._handCenterNX;
    var hy = H * window._handCenterNY;
    // 外圈
    bctx.strokeStyle = 'rgba(100,220,255,0.5)';
    bctx.lineWidth = 2;
    bctx.beginPath();
    bctx.arc(hx, hy, 18, 0, Math.PI*2);
    bctx.stroke();
    // 十字
    bctx.strokeStyle = 'rgba(100,220,255,0.4)';
    bctx.lineWidth = 1;
    bctx.beginPath();
    bctx.moveTo(hx-10, hy); bctx.lineTo(hx+10, hy);
    bctx.moveTo(hx, hy-10); bctx.lineTo(hx, hy+10);
    bctx.stroke();
    bctx.restore();
  }
}

// ---- 按钮 ----
camBtn.onclick=function(e){e.stopPropagation(); if(!camActive)initCamera();};
camBtn.ontouchstart=function(e){e.stopPropagation(); if(!camActive)initCamera();};

</script>
